  <body>
    <header>
      <details open>
        <summary>Input Selection Space Warp</summary>
        <p>
          This sample handles 'select' and 'squeeze' events generated by
          XRInputSources while rendering to a projection layer with optional
          Space Warp. When Space Warp is enabled it renders color, depth, and a
          motion vector pass for the projection layer.
          <a class="back" href="./">Back</a>
        </p>
        <p id="spacewarp-status"></p>
        <label><input type="checkbox" id="use_space_warp" checked>space warp</label>
        <label><input type="checkbox" id="use_multiview" disabled>multiview</label>
        <label><input type="checkbox" id="do_antialias" disabled>MSAA</label>
      </details>
    </header>
    <script type="module">
      import {WebXRButton} from '../js/util/webxr-button.js';
      import {Scene, WebXRView} from '../js/render/scenes/scene.js';
      import {Renderer, createWebGLContext} from '../js/render/core/renderer.js';
      import {Node} from '../js/render/core/node.js';
      import {Gltf2Node} from '../js/render/nodes/gltf2.js';
      import {PrimitiveStream} from '../js/render/geometry/primitive-stream.js';
      import {PbrMaterial} from '../js/render/materials/pbr.js';
      import {mat4, vec3} from '../js/render/math/gl-matrix.js';
      import {Ray} from '../js/render/math/ray.js';
      import {InlineViewerHelper} from '../js/util/inline-viewer-helper.js';
      import {QueryArgs} from '../js/util/query-args.js';

      // If requested, use the polyfill to provide support for mobile devices
      // and devices which only support WebVR.
      import WebXRPolyfill from '../js/third-party/webxr-polyfill/build/webxr-polyfill.module.js';
      if (QueryArgs.getBool('usePolyfill', true)) {
        let polyfill = new WebXRPolyfill();
      }

      // XR globals.
      let useSpaceWarp = document.getElementById('use_space_warp');
      let useMultiview = document.getElementById('use_multiview');
      let doAntialias = document.getElementById('do_antialias');
      let xrButton = null;
      let xrImmersiveRefSpace = null;
      let inlineViewerHelper = null;
      let xrGLFactory = null;
      let colorFramebuffer = null;
      let colorMsaaFramebuffer = null;
      let xrMotionFramebuffer = null;
      let colorMsaaColorRenderbuffer = null;
      let colorMsaaDepthRenderbuffer = null;
      let colorMsaaWidth = 0;
      let colorMsaaHeight = 0;
      let colorMsaaSamples = 0;
      let colorOffscreenTexture = null;
      let colorOffscreenWidth = 0;
      let colorOffscreenHeight = 0;
      let colorDepthRenderbuffer = null;
      let colorDepthRenderbufferWidth = 0;
      let colorDepthRenderbufferHeight = 0;
      let colorCopyProgram = null;
      let colorCopyTextureUniform = null;
      let colorPassUsesMsaa = false;
      let immersiveVrSupported = false;
      let spaceWarpEnabled = false;
      let spaceWarpCapabilities = {
        compatible: false,
        multiview: false,
        msaa: false,
        multiviewMsaa: false,
        msaaSamples: 0,
      };

      // WebGL scene globals.
      let gl = null;
      let renderer = null;
      let motionRenderer = null;
      let multiviewExtension = null;
      let colorDepthTexture = null;
      let colorDepthTextureWidth = 0;
      let colorDepthTextureHeight = 0;
      let colorDepthTextureViews = 0;
      let scene = null;
      let motionScene = null;
      let shapes = [];
      let motionShapes = [];
      let currentlySelectedShapes = [null, null];
      let currentlyGrabbedShapes = [null, null];
      const previousMatrices = {};

      // PBR-compatible material with deliberately expensive procedural fragment work.
      class FragmentStressMaterial extends PbrMaterial {
        get materialName() {
          return 'FragmentStress';
        }

        get fragmentSource() {
          return `
precision highp float;

uniform vec4 baseColorFactor;

in vec3 vLight;
in vec3 vView;
in vec2 vTex;
in vec3 vNorm;

vec4 fragment_main() {
  vec3 n = normalize(vNorm);
  vec3 l = normalize(vLight);
  vec3 v = normalize(vView);
  vec3 h = normalize(l + v);
  vec3 color = baseColorFactor.rgb * (0.35 + 0.65 * max(dot(n, l), 0.0));
  float specular = pow(max(dot(n, h), 0.0), 28.0);
  vec2 p = vTex * 10.0 + n.xy * 2.0;
  float pattern = 0.0;

  // Keep this loop small enough for interactive tuning while adding enough
  // procedural work to make the color pass more fragment-heavy than plain PBR.
  for (int i = 0; i < 6; ++i) {
    float fi = float(i);
    vec2 q = p + vec2(
        sin(fi * 1.37 + p.y * 0.61),
        cos(fi * 1.91 + p.x * 0.53));
    float wave = sin(q.x * (1.2 + fi * 0.035) + q.y * (0.8 + fi * 0.027));
    float ridge = abs(cos(dot(q, vec2(0.73, 1.21)) + fi * 0.29));
    pattern += sin(wave * ridge * 3.14159 + fi * 0.17) * 0.5 + 0.5;
    p = mat2(0.9659, -0.2588, 0.2588, 0.9659) * p + n.yz * 0.015;
  }

  pattern /= 6.0;
  vec3 procedural = vec3(
      pattern,
      pattern * pattern,
      sqrt(max(pattern, 0.0)));
  color = mix(color, color * procedural * 1.6, 0.5);
  color += vec3(specular);
  return vec4(color, baseColorFactor.a);
}`;
        }
      }

      // Normalizes a vector and returns +Y for degenerate inputs.
      function normalizeVector(x, y, z) {
        const length = Math.sqrt(x * x + y * y + z * z);
        if (length < 0.00001) {
          return [0, 1, 0];
        }

        return [x / length, y / length, z / length];
      }

      // Returns the cross product of two 3D vectors.
      function crossVector(a, b) {
        return [
          a[1] * b[2] - a[2] * b[1],
          a[2] * b[0] - a[0] * b[2],
          a[0] * b[1] - a[1] * b[0]
        ];
      }

      // Raises the absolute value to a power and restores the original sign.
      function signedPower(value, exponent) {
        return Math.sign(value) * Math.pow(Math.abs(value), exponent);
      }

      // Emits a high-resolution parametric triangle grid into a PrimitiveStream.
      function pushParametricSurface(stream, columns, rows, getVertex) {
        const rowStride = columns + 1;

        stream.startGeometry();
        for (let row = 0; row <= rows; ++row) {
          const v = row / rows;
          for (let column = 0; column <= columns; ++column) {
            const u = column / columns;
            const vertex = getVertex(u, v);
            stream.pushVertex(
                vertex[0],
                vertex[1],
                vertex[2],
                u,
                v,
                vertex[3],
                vertex[4],
                vertex[5]);
          }
        }

        for (let row = 0; row < rows; ++row) {
          for (let column = 0; column < columns; ++column) {
            const index = row * rowStride + column;
            stream.pushTriangle(index, index + rowStride, index + 1);
            stream.pushTriangle(index + 1, index + rowStride, index + rowStride + 1);
          }
        }
        stream.endGeometry();
      }

      // Builds a dense organic sphere with radius ripples to stress vertex and fragment work.
      function createRuffledSpherePrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;
        const radius = 0.26;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = v * Math.PI;
          const sinPhi = Math.sin(phi);
          const ripple =
              1.0 +
              0.09 * Math.sin(theta * 17.0) * Math.sin(phi * 11.0) +
              0.04 * Math.cos(theta * 9.0 + phi * 7.0);
          const r = radius * ripple;
          const x = Math.sin(theta) * sinPhi * r;
          const y = Math.cos(phi) * r;
          const z = Math.cos(theta) * sinPhi * r;
          const normal = normalizeVector(x, y, z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return stream.finishPrimitive(targetRenderer);
      }

      // Builds a dense torus knot tube with a varying radius along the knot.
      function createTorusKnotPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 512;
        const rows = 96;
        const pathScale = 0.105;
        const tubeRadius = 0.035;

        function getCenter(t) {
          return [
            pathScale * (2.0 + Math.cos(3.0 * t)) * Math.cos(2.0 * t),
            pathScale * Math.sin(3.0 * t),
            pathScale * (2.0 + Math.cos(3.0 * t)) * Math.sin(2.0 * t)
          ];
        }

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const t = u * Math.PI * 2.0;
          const center = getCenter(t);
          const next = getCenter(t + 0.01);
          const previous = getCenter(t - 0.01);
          const tangent = normalizeVector(
              next[0] - previous[0],
              next[1] - previous[1],
              next[2] - previous[2]);
          let frameSeed = [0, 1, 0];
          if (Math.abs(tangent[1]) > 0.9) {
            frameSeed = [1, 0, 0];
          }
          const normalAxis = normalizeVector(...crossVector(frameSeed, tangent));
          const binormalAxis = normalizeVector(...crossVector(tangent, normalAxis));
          const angle = v * Math.PI * 2.0;
          const radius = tubeRadius * (1.0 + 0.18 * Math.sin(t * 13.0));
          const nx =
              Math.cos(angle) * normalAxis[0] +
              Math.sin(angle) * binormalAxis[0];
          const ny =
              Math.cos(angle) * normalAxis[1] +
              Math.sin(angle) * binormalAxis[1];
          const nz =
              Math.cos(angle) * normalAxis[2] +
              Math.sin(angle) * binormalAxis[2];
          return [
            center[0] + nx * radius,
            center[1] + ny * radius,
            center[2] + nz * radius,
            nx,
            ny,
            nz
          ];
        });

        return stream.finishPrimitive(targetRenderer);
      }

      // Adds one toothed cap to the gear-column stress mesh.
      function pushGearCap(stream, y, normalY, columns, rings, getRadius) {
        stream.startGeometry();
        stream.pushVertex(0, y, 0, 0.5, 0.5, 0, normalY, 0);
        for (let ring = 1; ring <= rings; ++ring) {
          const ringRatio = ring / rings;
          for (let column = 0; column <= columns; ++column) {
            const u = column / columns;
            const theta = u * Math.PI * 2.0;
            const radius = getRadius(theta, u) * ringRatio;
            stream.pushVertex(
                Math.sin(theta) * radius,
                y,
                Math.cos(theta) * radius,
                Math.sin(theta) * ringRatio * 0.5 + 0.5,
                Math.cos(theta) * ringRatio * 0.5 + 0.5,
                0,
                normalY,
                0);
          }
        }

        for (let column = 0; column < columns; ++column) {
          const first = 1 + column;
          if (normalY > 0) {
            stream.pushTriangle(0, first, first + 1);
          } else {
            stream.pushTriangle(0, first + 1, first);
          }
        }

        const rowStride = columns + 1;
        for (let ring = 1; ring < rings; ++ring) {
          const innerStart = 1 + (ring - 1) * rowStride;
          const outerStart = 1 + ring * rowStride;
          for (let column = 0; column < columns; ++column) {
            const inner = innerStart + column;
            const outer = outerStart + column;
            if (normalY > 0) {
              stream.pushTriangle(inner, outer, inner + 1);
              stream.pushTriangle(inner + 1, outer, outer + 1);
            } else {
              stream.pushTriangle(inner, inner + 1, outer);
              stream.pushTriangle(inner + 1, outer + 1, outer);
            }
          }
        }
        stream.endGeometry();
      }

      // Builds a high-poly ridged gear column with dense side and cap geometry.
      function createRidgedGearPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 112;
        const rings = 32;
        const height = 0.52;
        const baseRadius = 0.18;
        const toothCount = 28;

        function getRadius(theta, u, v = 0.5) {
          const tooth = Math.pow(0.5 + 0.5 * Math.cos(theta * toothCount), 5.0);
          const verticalRipple = 0.05 * Math.sin(v * Math.PI * 18.0 + theta * 5.0);
          return baseRadius * (1.0 + 0.34 * tooth + verticalRipple);
        }

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const radius = getRadius(theta, u, v);
          const x = Math.sin(theta) * radius;
          const y = (v - 0.5) * height;
          const z = Math.cos(theta) * radius;
          const normal = normalizeVector(x, 0, z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });
        pushGearCap(stream, height * 0.5, 1, columns, rings, getRadius);
        pushGearCap(stream, -height * 0.5, -1, columns, rings, getRadius);

        return stream.finishPrimitive(targetRenderer);
      }

      // Builds a twisted superquadric with fine ripples over a dense closed surface.
      function createTwistedSuperquadricPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = (v - 0.5) * Math.PI;
          const twist = theta + Math.sin(phi) * 2.6;
          const cosPhi = Math.cos(phi);
          const shell =
              1.0 +
              0.06 * Math.sin(theta * 23.0) * Math.cos(phi * 17.0);
          const x =
              0.24 * shell *
              signedPower(cosPhi, 0.52) *
              signedPower(Math.cos(twist), 0.42);
          const y = 0.30 * shell * signedPower(Math.sin(phi), 0.62);
          const z =
              0.24 * shell *
              signedPower(cosPhi, 0.52) *
              signedPower(Math.sin(twist), 0.42);
          const normal = normalizeVector(x / 0.24, y / 0.30, z / 0.24);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return stream.finishPrimitive(targetRenderer);
      }

      // Builds a dense radial sphere with high-frequency spikes.
      function createSpikySpherePrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;
        const radius = 0.22;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = v * Math.PI;
          const sinPhi = Math.sin(phi);
          const spike =
              Math.pow(Math.abs(Math.sin(theta * 29.0) * Math.sin(phi * 19.0)), 7.0);
          const ripple =
              1.0 +
              0.38 * spike +
              0.05 * Math.sin(theta * 11.0 + phi * 13.0);
          const r = radius * ripple;
          const x = Math.sin(theta) * sinPhi * r;
          const y = Math.cos(phi) * r;
          const z = Math.cos(theta) * sinPhi * r;
          const normal = normalizeVector(x, y, z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return stream.finishPrimitive(targetRenderer);
      }

      // Builds a lumpy torus with dense longitudinal and radial waves.
      function createWavyTorusPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = v * Math.PI * 2.0;
          const majorRadius = 0.19 + 0.025 * Math.sin(theta * 9.0 + phi * 2.0);
          const minorRadius =
              0.075 * (1.0 + 0.22 * Math.sin(theta * 13.0) * Math.cos(phi * 7.0));
          const ringRadius = majorRadius + minorRadius * Math.cos(phi);
          const x = Math.sin(theta) * ringRadius;
          const y = minorRadius * Math.sin(phi);
          const z = Math.cos(theta) * ringRadius;
          const normal = normalizeVector(
              Math.sin(theta) * Math.cos(phi),
              Math.sin(phi),
              Math.cos(theta) * Math.cos(phi));
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return stream.finishPrimitive(targetRenderer);
      }

      // Builds a two-turn helical tube with a ribbed radius along the coil.
      function createHelicalTubePrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 512;
        const rows = 96;
        const coilRadius = 0.18;
        const tubeRadius = 0.038;
        const height = 0.58;

        function getCenter(u) {
          const t = u * Math.PI * 4.0;
          return [
            Math.sin(t) * coilRadius,
            (u - 0.5) * height,
            Math.cos(t) * coilRadius
          ];
        }

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const t = u * Math.PI * 4.0;
          const center = getCenter(u);
          const next = getCenter(Math.min(1.0, u + 0.002));
          const previous = getCenter(Math.max(0.0, u - 0.002));
          const tangent = normalizeVector(
              next[0] - previous[0],
              next[1] - previous[1],
              next[2] - previous[2]);
          const radial = normalizeVector(Math.sin(t), 0, Math.cos(t));
          const binormal = normalizeVector(...crossVector(tangent, radial));
          const angle = v * Math.PI * 2.0;
          const radius = tubeRadius * (1.0 + 0.18 * Math.sin(t * 7.0 + angle * 5.0));
          const nx = Math.cos(angle) * radial[0] + Math.sin(angle) * binormal[0];
          const ny = Math.cos(angle) * radial[1] + Math.sin(angle) * binormal[1];
          const nz = Math.cos(angle) * radial[2] + Math.sin(angle) * binormal[2];
          return [
            center[0] + nx * radius,
            center[1] + ny * radius,
            center[2] + nz * radius,
            nx,
            ny,
            nz
          ];
        });

        return stream.finishPrimitive(targetRenderer);
      }

      // Builds an asymmetric corrugated shell surface with a spiral profile.
      function createCorrugatedShellPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = v * Math.PI;
          const sinPhi = Math.sin(phi);
          const spiralScale = 0.68 + 0.46 * u;
          const corrugation =
              1.0 +
              0.12 * Math.sin(theta * 31.0 + phi * 9.0) +
              0.05 * Math.cos(theta * 7.0 - phi * 15.0);
          const r = 0.22 * spiralScale * corrugation;
          const x = Math.sin(theta) * sinPhi * r + (u - 0.5) * 0.10;
          const y = Math.cos(phi) * r * 0.82;
          const z = Math.cos(theta) * sinPhi * r;
          const normal = normalizeVector(
              x - (u - 0.5) * 0.10,
              y / 0.82,
              z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return stream.finishPrimitive(targetRenderer);
      }

      // Builds a dense faceted crystal column with lobed radial cuts.
      function createLobedCrystalPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;
        const height = 0.58;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const y = (v - 0.5) * height;
          const taper = 1.0 - Math.pow(Math.abs(v - 0.5) * 2.0, 1.7);
          const facets =
              1.0 +
              0.32 * Math.pow(Math.abs(Math.cos(theta * 8.0)), 9.0) +
              0.08 * Math.sin(theta * 21.0 + v * Math.PI * 18.0);
          const radius = 0.07 + 0.19 * Math.max(0.0, taper) * facets;
          const x = Math.sin(theta) * radius;
          const z = Math.cos(theta) * radius;
          const normal = normalizeVector(x, 0.18 * Math.sign(v - 0.5), z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return stream.finishPrimitive(targetRenderer);
      }

      // Builds the cube-room scene and selectable stress shapes for a given renderer.
      function createSelectionScene(targetRenderer) {
        const targetScene = new Scene();
        targetScene.addNode(new Gltf2Node({url: '../media/gltf/cube-room/cube-room.gltf'}));
        targetScene.standingStats(true);
        targetScene.setRenderer(targetRenderer);

        const targetShapes = [];
        const shapePrimitives = [
          createRuffledSpherePrimitive(targetRenderer),
          createTorusKnotPrimitive(targetRenderer),
          createRidgedGearPrimitive(targetRenderer),
          createTwistedSuperquadricPrimitive(targetRenderer),
          createSpikySpherePrimitive(targetRenderer),
          createWavyTorusPrimitive(targetRenderer),
          createHelicalTubePrimitive(targetRenderer),
          createCorrugatedShellPrimitive(targetRenderer),
          createLobedCrystalPrimitive(targetRenderer)
        ];

        // Adds one selectable stress shape and tracks the sample state outside the scene graph.
        function addShape(shapeIndex, x, y, z, r, g, b) {
          const shapeMaterial = new FragmentStressMaterial();
          shapeMaterial.state.cullFace = false;
          shapeMaterial.baseColorFactor.value = [r, g, b, 1.0];
          const shapeRenderPrimitive =
              targetRenderer.createRenderPrimitive(shapePrimitives[shapeIndex], shapeMaterial);
          const shapeNode = new Node();
          shapeNode.addRenderPrimitive(shapeRenderPrimitive);
          shapeNode.selectable = true;

          const shape = {
            node: shapeNode,
            renderPrimitive: shapeRenderPrimitive,
            position: [x, y, z],
            scale: [1, 1, 1],
            selected: false,
            grabbed: false,
            originalPos: null,
          };
          targetShapes.push(shape);
          targetScene.addNode(shapeNode);
        }

        addShape(0, -1.1, 1.45, -1.2, 1.0, 0.0, 0.0);
        addShape(1, 0.0, 1.45, -1.2, 0.0, 1.0, 0.0);
        addShape(2, 1.1, 1.45, -1.2, 0.0, 0.0, 1.0);
        addShape(3, -1.1, 1.75, -1.6, 1.0, 0.8, 0.0);
        addShape(4, 0.0, 1.75, -1.6, 0.0, 0.9, 1.0);
        addShape(5, 1.1, 1.75, -1.6, 1.0, 0.0, 0.9);
        addShape(6, -1.1, 2.05, -2.0, 1.0, 0.45, 0.0);
        addShape(7, 0.0, 2.05, -2.0, 0.55, 0.25, 1.0);
        addShape(8, 1.1, 2.05, -2.0, 0.9, 0.9, 0.9);

        return {scene: targetScene, shapes: targetShapes};
      }

      // Creates the XR button, probes support, and starts the inline preview session.
      function initXR() {
        xrButton = new WebXRButton({
          onRequestSession: onRequestSession,
          onEndSession: onEndSession
        });
        document.querySelector('header').appendChild(xrButton.domElement);

        if (navigator.xr) {
          navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
            immersiveVrSupported = supported;
            spaceWarpCapabilities = testSpaceWarpCompatibility();
            updateFeatureControls();
          });

          navigator.xr.requestSession('inline').then(onSessionStarted);
        }
      }

      // Probes the WebGL capabilities needed by the Space Warp projection-layer paths.
      function getSpaceWarpCapabilities(testGl) {
        const multiview = getMultiviewExtension(testGl);
        const hasHalfFloatRenderTarget =
            !!testGl.getExtension('EXT_color_buffer_float') ||
            !!testGl.getExtension('EXT_color_buffer_half_float');
        const msaaSamples = Math.min(
            getMaxRenderableSamples(testGl, testGl.RGBA8),
            getMaxRenderableSamples(testGl, testGl.DEPTH_COMPONENT24));

        return {
          compatible: hasHalfFloatRenderTarget,
          multiview: !!multiview,
          msaa: msaaSamples > 0,
          multiviewMsaa: !!multiview &&
              !!multiview.framebufferTextureMultisampleMultiviewOVR &&
              msaaSamples > 0,
          msaaSamples: msaaSamples,
        };
      }

      // Returns whichever multiview extension variant the browser exposes.
      function getMultiviewExtension(context) {
        return context.getExtension('OCULUS_multiview') ||
            context.getExtension('OVR_multiview2');
      }

      // Finds the maximum renderbuffer sample count for an internal format.
      function getMaxRenderableSamples(context, internalFormat) {
        if (!context.getInternalformatParameter) {
          return context.getParameter(context.MAX_SAMPLES) || 0;
        }

        const samples = context.getInternalformatParameter(
            context.RENDERBUFFER,
            internalFormat,
            context.SAMPLES);
        return samples && samples.length ? samples[0] : 0;
      }

      // Uses a temporary context so the feature controls can be initialized before the main context exists.
      function testSpaceWarpCompatibility() {
        const tempGl = createWebGLContext({
          xrCompatible: true,
          webgl2: true
        });
        if (!tempGl) {
          return {
            compatible: false,
            multiview: false,
            msaa: false,
            multiviewMsaa: false,
            msaaSamples: 0,
          };
        }

        const capabilities = getSpaceWarpCapabilities(tempGl);
        tempGl.canvas.remove();
        return capabilities;
      }

      // Enables UI toggles only for rendering paths supported by the current WebGL capabilities.
      function updateFeatureControls() {
        const requestSpaceWarp = useSpaceWarp.checked;
        useMultiview.disabled = !spaceWarpCapabilities.multiview;
        if (!spaceWarpCapabilities.multiview) {
          useMultiview.checked = false;
        } else if (!useMultiview.dataset.initialized) {
          useMultiview.checked = true;
        }

        doAntialias.disabled =
            !spaceWarpCapabilities.msaa ||
            (useMultiview.checked && !spaceWarpCapabilities.multiviewMsaa);
        if (doAntialias.disabled) {
          doAntialias.checked = false;
        } else if (!doAntialias.dataset.initialized) {
          doAntialias.checked = true;
        }

        useMultiview.dataset.initialized = 'true';
        doAntialias.dataset.initialized = 'true';

        document.querySelector('#spacewarp-status').textContent =
            requestSpaceWarp ?
              (spaceWarpCapabilities.compatible ?
                'Projection-layer Space Warp path is available.' :
                'Projection-layer Space Warp path needs WebGL2 and renderable half-float color targets.') :
              'Space Warp disabled; projection-layer color path only.';

        if (xrButton) {

              immersiveVrSupported &&
              (!requestSpaceWarp || spaceWarpCapabilities.compatible);
        }

      useSpaceWarp.addEventListener('change', updateFeatureControls);
      useMultiview.addEventListener('change', updateFeatureControls);

      // Creates the shared WebGL2 context and caches extension support.
      function initGL() {
        if (gl)
          return;

        gl = createWebGLContext({
          xrCompatible: true,
          webgl2: true
        });
        document.body.appendChild(gl.canvas);

        spaceWarpCapabilities = getSpaceWarpCapabilities(gl);
        updateFeatureControls();

        multiviewExtension = getMultiviewExtension(gl);
        if (useSpaceWarp.checked && !spaceWarpCapabilities.compatible) {
          console.error('Space Warp sample requires renderable half-float color targets.');
        }

        // Matches the inline canvas backing store to its CSS size and device pixel ratio.
        function onResize() {
          gl.canvas.width = gl.canvas.clientWidth * window.devicePixelRatio;
          gl.canvas.height = gl.canvas.clientHeight * window.devicePixelRatio;
        }
        window.addEventListener('resize', onResize);
        onResize();

        gl.clearColor(0.1, 0.2, 0.3, 1.0);
      }

      // Requests the immersive session with layers and optional Space Warp.
      function onRequestSession() {
        const requiredFeatures = ['local-floor', 'layers'];
        const requestSpaceWarp = useSpaceWarp.checked;
        if (requestSpaceWarp) {
          requiredFeatures.push('space-warp');
        }

        return navigator.xr.requestSession('immersive-vr', {
          requiredFeatures: requiredFeatures
        }).then((session) => {
          xrButton.setSession(session);
          session.isImmersive = true;
          session.spaceWarpEnabled = requestSpaceWarp;
          onSessionStarted(session);
        });
      }

      // Initializes renderers, scenes, and XR layers for either inline or immersive mode.
      function onSessionStarted(session) {
        session.addEventListener('end', onSessionEnded);
        session.addEventListener('selectstart', onSelectStart);
        session.addEventListener('selectend', onSelectEnd);
        session.addEventListener('select', onSelect);
        session.addEventListener('squeezestart', onSqueezeStart);
        session.addEventListener('squeezeend', onSqueezeEnd);
        session.addEventListener('squeeze', onSqueeze);

        initGL();
        currentlySelectedShapes = [null, null];
        currentlyGrabbedShapes = [null, null];

        if (session.isImmersive) {
          spaceWarpEnabled = !!session.spaceWarpEnabled;
          const enableMultiview =
              spaceWarpCapabilities.multiview && useMultiview.checked;
          const enableMsaa =
              spaceWarpCapabilities.msaa &&
              doAntialias.checked &&
              (!enableMultiview || spaceWarpCapabilities.multiviewMsaa);
          colorPassUsesMsaa = enableMsaa;
          const enableMultiviewMsaa =
              enableMultiview && enableMsaa && spaceWarpCapabilities.multiviewMsaa;

          renderer = new Renderer(gl, {
            multiview: enableMultiview,
            multisampledMultiview: enableMultiviewMsaa
          });
          const sceneState = createSelectionScene(renderer);
          scene = sceneState.scene;
          shapes = sceneState.shapes;

          scene.inputRenderer.useProfileControllerMeshes(session);
          if (spaceWarpEnabled) {
            motionRenderer = new Renderer(gl, {
              multiview: enableMultiview,
              motionVectorPass: true
            });
            const motionSceneState = createSelectionScene(motionRenderer);
            motionScene = motionSceneState.scene;
            motionShapes = motionSceneState.shapes;
            motionScene.inputRenderer.useProfileControllerMeshes(session);
          } else {
            motionRenderer = null;
            motionScene = null;
            motionShapes = [];
          }

          resetColorTargets();
          colorFramebuffer = gl.createFramebuffer();
          colorMsaaFramebuffer = gl.createFramebuffer();
          xrMotionFramebuffer = spaceWarpEnabled ? gl.createFramebuffer() : null;
          xrGLFactory = new XRWebGLBinding(session, gl);
          const layerInit = {
            textureType: 'texture-array',
            colorFormat: gl.RGBA8,
            clearOnAccess: false
          };
          if (spaceWarpEnabled) {
            layerInit.depthFormat = gl.DEPTH_COMPONENT24;
          }
          const layer = xrGLFactory.createProjectionLayer(layerInit);
          session.updateRenderState({layers: [layer]});
        } else {
          spaceWarpEnabled = false;
          renderer = new Renderer(gl);
          const sceneState = createSelectionScene(renderer);
          scene = sceneState.scene;
          shapes = sceneState.shapes;
          motionRenderer = null;
          motionScene = null;
          motionShapes = [];

          scene.inputRenderer.useProfileControllerMeshes(session);

          let glLayer = new XRWebGLLayer(session, gl);
          session.updateRenderState({baseLayer: glLayer});
        }

        let refSpaceType = session.isImmersive ? 'local-floor' : 'viewer';
        session.requestReferenceSpace(refSpaceType).then((refSpace) => {
          if (session.isImmersive) {
            xrImmersiveRefSpace = refSpace;
          } else {
            inlineViewerHelper = new InlineViewerHelper(gl.canvas, refSpace);
            inlineViewerHelper.setHeight(1.6);
          }
          session.requestAnimationFrame(onXRFrame);
        });
      }

      // Ends the current session when the XR button exits presentation.
      function onEndSession(session) {
        session.end();
      }

      // Clears immersive-only state that should not leak into a future session.
      function onSessionEnded(event) {
        if (event.session.isImmersive) {
          xrButton.setSession(null);
          spaceWarpEnabled = false;
          motionRenderer = null;
          motionScene = null;
          motionShapes = [];
          for (let key of Object.keys(previousMatrices)) {
            delete previousMatrices[key];
          }
        }
      }

      // Chooses the reference space used to interpret input event poses.
      function getEventRefSpace(session) {
        return session.isImmersive ?
            xrImmersiveRefSpace :
            inlineViewerHelper.referenceSpace;
      }

      // Maps left and right hands to the small per-hand state arrays.
      function getHandIndex(inputSource) {
        return inputSource.handedness == 'left' ? 0 : 1;
      }

      // Finds the selectable stress shape currently hit by an input source target ray.
      function findHitShape(frame, inputSource) {
        const refSpace = getEventRefSpace(frame.session);
        const targetRayPose = frame.getPose(inputSource.targetRaySpace, refSpace);
        if (!targetRayPose) {
          return null;
        }

        const hitResult = scene.hitTest(targetRayPose.transform);
        if (!hitResult) {
          return null;
        }

        return shapes.find(shape => hitResult.node == shape.node) || null;
      }

      // Marks a shape as a pending select target and previews the interaction.
      function onSelectStart(ev) {
        const hitShape = findHitShape(ev.frame, ev.inputSource);
        if (!hitShape) {
          return;
        }

        const handIndex = getHandIndex(ev.inputSource);
        currentlySelectedShapes[handIndex] = hitShape;
        hitShape.scale = [1.25, 1.25, 1.25];
        hitShape.selected = false;
      }

      // Completes or cancels the pending select visual state for a hand.
      function onSelectEnd(ev) {
        const handIndex = getHandIndex(ev.inputSource);
        const selectedShape = currentlySelectedShapes[handIndex];
        if (!selectedShape) {
          return;
        }

        if (selectedShape.selected) {
          vec3.add(selectedShape.scale, selectedShape.scale, [0.25, 0.25, 0.25]);
          selectedShape.selected = false;
        } else {
          selectedShape.scale = [0.75, 0.75, 0.75];
        }
        currentlySelectedShapes[handIndex] = null;
      }

      // Applies the sample's select action: randomize color and shrink the shape.
      function onSelect(ev) {
        const handIndex = getHandIndex(ev.inputSource);
        const selectedShape = currentlySelectedShapes[handIndex];
        if (!selectedShape) {
          return;
        }

        const uniforms = selectedShape.renderPrimitive.uniforms;
        uniforms.baseColorFactor.value = [Math.random(), Math.random(), Math.random(), 1.0];
        vec3.add(selectedShape.scale, selectedShape.scale, [-0.5, -0.5, -0.5]);
        selectedShape.selected = true;
      }

      // Starts a grab interaction for the hit shape.
      function onSqueezeStart(ev) {
        const hitShape = findHitShape(ev.frame, ev.inputSource);
        if (!hitShape || hitShape.grabbed) {
          return;
        }

        const handIndex = getHandIndex(ev.inputSource);
        currentlyGrabbedShapes[handIndex] = hitShape;
        hitShape.scale = [0.1, 0.1, 0.1];
        hitShape.originalPos = hitShape.position;
        hitShape.grabbed = true;
      }

      // Restores a grabbed shape when the squeeze interaction ends.
      function onSqueezeEnd(ev) {
        const handIndex = getHandIndex(ev.inputSource);
        const grabbedShape = currentlyGrabbedShapes[handIndex];
        if (!grabbedShape || !grabbedShape.grabbed) {
          return;
        }

        vec3.add(grabbedShape.scale, grabbedShape.scale, [1, 1, 1]);
        grabbedShape.position = grabbedShape.originalPos;
        grabbedShape.grabbed = false;
        currentlyGrabbedShapes[handIndex] = null;
      }

      // Applies the sample's squeeze action while a shape is grabbed.
      function onSqueeze(ev) {
        const handIndex = getHandIndex(ev.inputSource);
        const grabbedShape = currentlyGrabbedShapes[handIndex];
        if (!grabbedShape || !grabbedShape.grabbed) {
          return;
        }

        const uniforms = grabbedShape.renderPrimitive.uniforms;
        uniforms.baseColorFactor.value = [Math.random(), Math.random(), Math.random(), 1.0];
      }

      // Moves grabbed shapes to a stable point along each active target ray.
      function updateGrabbedShapes(frame, refSpace) {
        for (let inputSource of frame.session.inputSources) {
          const targetRayPose = frame.getPose(inputSource.targetRaySpace, refSpace);
          if (!targetRayPose) {
            continue;
          }

          const handIndex = getHandIndex(inputSource);
          const grabbedShape = currentlyGrabbedShapes[handIndex];
          if (!grabbedShape || !grabbedShape.grabbed) {
            continue;
          }

          const targetRay = new Ray(targetRayPose.transform.matrix);
          const grabDistance = 0.1;
          const grabPos = vec3.fromValues(
              targetRay.origin[0],
              targetRay.origin[1],
              targetRay.origin[2]);
          vec3.add(grabPos, grabPos, [
              targetRay.direction[0] * grabDistance,
              targetRay.direction[1] * grabDistance + 0.06,
              targetRay.direction[2] * grabDistance,
              ]);
          grabbedShape.position = grabPos;
        }
      }

      // Updates shape transforms, optionally mirroring state from the color scene to the motion scene.
      function updateShapeMatrices(targetShapes, time, sourceShapes = targetShapes) {
        for (let i = 0; i < targetShapes.length; ++i) {
          const sourceShape = sourceShapes[i];
          const targetShape = targetShapes[i];
          targetShape.position = sourceShape.position;
          targetShape.scale = sourceShape.scale;

          const node = targetShape.node;
          mat4.identity(node.matrix);
          mat4.translate(node.matrix, node.matrix, targetShape.position);
          mat4.rotateX(node.matrix, node.matrix, time / 1000);
          mat4.rotateY(node.matrix, node.matrix, time / 1500);
          mat4.scale(node.matrix, node.matrix, targetShape.scale);
        }
      }

      // Converts framebuffer status enums into readable diagnostics.
      function getFramebufferStatusName(status) {
        switch (status) {
          case gl.FRAMEBUFFER_COMPLETE:
            return 'FRAMEBUFFER_COMPLETE';
          case gl.FRAMEBUFFER_INCOMPLETE_ATTACHMENT:
            return 'FRAMEBUFFER_INCOMPLETE_ATTACHMENT';
          case gl.FRAMEBUFFER_INCOMPLETE_MISSING_ATTACHMENT:
            return 'FRAMEBUFFER_INCOMPLETE_MISSING_ATTACHMENT';
          case gl.FRAMEBUFFER_INCOMPLETE_DIMENSIONS:
            return 'FRAMEBUFFER_INCOMPLETE_DIMENSIONS';
          case gl.FRAMEBUFFER_UNSUPPORTED:
            return 'FRAMEBUFFER_UNSUPPORTED';
          case gl.FRAMEBUFFER_INCOMPLETE_MULTISAMPLE:
            return 'FRAMEBUFFER_INCOMPLETE_MULTISAMPLE';
          default:
            return `0x${status.toString(16)}`;
        }
      }

      // Checks the currently bound draw framebuffer and logs a useful label on failure.
      function checkDrawFramebuffer(label) {
        const status = gl.checkFramebufferStatus(gl.DRAW_FRAMEBUFFER);
        if (status == gl.FRAMEBUFFER_COMPLETE) {
          return true;
        }

        console.error(`${label} framebuffer incomplete: ${getFramebufferStatusName(status)}`);
        return false;
      }

      // Allocates the multiview color-pass depth texture used only for direct color rendering.
      function ensureColorDepthTexture(width, height, viewCount) {
        if (colorDepthTexture &&
            colorDepthTextureWidth == width &&
            colorDepthTextureHeight == height &&
            colorDepthTextureViews == viewCount) {
          return colorDepthTexture;
        }

        if (colorDepthTexture) {
          gl.deleteTexture(colorDepthTexture);
        }

        colorDepthTexture = gl.createTexture();
        colorDepthTextureWidth = width;
        colorDepthTextureHeight = height;
        colorDepthTextureViews = viewCount;

        gl.bindTexture(gl.TEXTURE_2D_ARRAY, colorDepthTexture);
        gl.texStorage3D(
            gl.TEXTURE_2D_ARRAY,
            1,
            gl.DEPTH_COMPONENT24,
            colorDepthTextureWidth,
            colorDepthTextureHeight,
            colorDepthTextureViews);
        gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

        return colorDepthTexture;
      }

      // Allocates and attaches the non-multiview MSAA color/depth renderbuffers.
      function ensureColorMsaaFramebuffer(width, height) {
        const samples = Math.min(spaceWarpCapabilities.msaaSamples, renderer.maxSamples);
        if (samples <= 0) {
          return null;
        }

        if (!colorMsaaFramebuffer) {
          colorMsaaFramebuffer = gl.createFramebuffer();
        }
        if (!colorMsaaColorRenderbuffer ||
            !colorMsaaDepthRenderbuffer ||
            colorMsaaWidth != width ||
            colorMsaaHeight != height ||
            colorMsaaSamples != samples) {
          if (colorMsaaColorRenderbuffer) {
            gl.deleteRenderbuffer(colorMsaaColorRenderbuffer);
          }
          if (colorMsaaDepthRenderbuffer) {
            gl.deleteRenderbuffer(colorMsaaDepthRenderbuffer);
          }

          colorMsaaColorRenderbuffer = gl.createRenderbuffer();
          colorMsaaDepthRenderbuffer = gl.createRenderbuffer();
          colorMsaaWidth = width;
          colorMsaaHeight = height;
          colorMsaaSamples = samples;

          gl.bindRenderbuffer(gl.RENDERBUFFER, colorMsaaColorRenderbuffer);
          gl.renderbufferStorageMultisample(
              gl.RENDERBUFFER,
              colorMsaaSamples,
              gl.RGBA8,
              colorMsaaWidth,
              colorMsaaHeight);

          gl.bindRenderbuffer(gl.RENDERBUFFER, colorMsaaDepthRenderbuffer);
          gl.renderbufferStorageMultisample(
              gl.RENDERBUFFER,
              colorMsaaSamples,
              gl.DEPTH_COMPONENT24,
              colorMsaaWidth,
              colorMsaaHeight);
        }

        gl.bindFramebuffer(gl.FRAMEBUFFER, colorMsaaFramebuffer);
        gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
        gl.framebufferRenderbuffer(
            gl.FRAMEBUFFER,
            gl.COLOR_ATTACHMENT0,
            gl.RENDERBUFFER,
            colorMsaaColorRenderbuffer);
        gl.framebufferRenderbuffer(
            gl.FRAMEBUFFER,
            gl.DEPTH_ATTACHMENT,
            gl.RENDERBUFFER,
            colorMsaaDepthRenderbuffer);

        return colorMsaaFramebuffer;
      }

      // Allocates the single-sample app-owned depth buffer for direct non-multiview color rendering.
      function ensureColorDepthRenderbuffer(width, height) {
        if (colorDepthRenderbuffer &&
            colorDepthRenderbufferWidth == width &&
            colorDepthRenderbufferHeight == height) {
          return colorDepthRenderbuffer;
        }

        if (colorDepthRenderbuffer) {
          gl.deleteRenderbuffer(colorDepthRenderbuffer);
        }

        colorDepthRenderbuffer = gl.createRenderbuffer();
        colorDepthRenderbufferWidth = width;
        colorDepthRenderbufferHeight = height;

        gl.bindRenderbuffer(gl.RENDERBUFFER, colorDepthRenderbuffer);
        gl.renderbufferStorage(
            gl.RENDERBUFFER,
            gl.DEPTH_COMPONENT24,
            colorDepthRenderbufferWidth,
            colorDepthRenderbufferHeight);

        return colorDepthRenderbuffer;
      }

      // Allocates the single-sample texture used as the MSAA resolve target.
      function ensureColorOffscreenFramebuffer(width, height) {
        if (!colorFramebuffer) {
          colorFramebuffer = gl.createFramebuffer();
        }
        if (!colorOffscreenTexture ||
            colorOffscreenWidth != width ||
            colorOffscreenHeight != height) {
          if (colorOffscreenTexture) {
            gl.deleteTexture(colorOffscreenTexture);
          }

          colorOffscreenTexture = gl.createTexture();
          colorOffscreenWidth = width;
          colorOffscreenHeight = height;

          gl.bindTexture(gl.TEXTURE_2D, colorOffscreenTexture);
          gl.texStorage2D(
              gl.TEXTURE_2D,
              1,
              gl.RGBA8,
              colorOffscreenWidth,
              colorOffscreenHeight);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        }

        gl.bindFramebuffer(gl.FRAMEBUFFER, colorFramebuffer);
        gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
        gl.framebufferTexture2D(
            gl.FRAMEBUFFER,
            gl.COLOR_ATTACHMENT0,
            gl.TEXTURE_2D,
            colorOffscreenTexture,
            0);
        gl.framebufferRenderbuffer(
            gl.FRAMEBUFFER,
            gl.DEPTH_ATTACHMENT,
            gl.RENDERBUFFER,
            null);

        return colorFramebuffer;
      }

      // Compiles one shader for the fullscreen color-copy pass.
      function compileColorCopyShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(shader));
          gl.deleteShader(shader);
          return null;
        }

        return shader;
      }

      // Creates the fullscreen copy program used after the non-multiview MSAA resolve.
      function ensureColorCopyProgram() {
        if (colorCopyProgram) {
          return colorCopyProgram;
        }

        const vertexShader = compileColorCopyShader(gl.VERTEX_SHADER, `#version 300 es
out vec2 vTexCoord;

const vec2 positions[3] = vec2[3](
  vec2(-1.0, -1.0),
  vec2(3.0, -1.0),
  vec2(-1.0, 3.0));

void main() {
  vec2 position = positions[gl_VertexID];
  vTexCoord = position * 0.5 + 0.5;
  gl_Position = vec4(position, 0.0, 1.0);
}`);
        const fragmentShader = compileColorCopyShader(gl.FRAGMENT_SHADER, `#version 300 es
precision highp float;

uniform sampler2D colorTexture;
in vec2 vTexCoord;
out vec4 color;

void main() {
  color = texture(colorTexture, vTexCoord);
}`);
        if (!vertexShader || !fragmentShader) {
          return null;
        }

        colorCopyProgram = gl.createProgram();
        gl.attachShader(colorCopyProgram, vertexShader);
        gl.attachShader(colorCopyProgram, fragmentShader);
        gl.linkProgram(colorCopyProgram);
        gl.deleteShader(vertexShader);
        gl.deleteShader(fragmentShader);

        if (!gl.getProgramParameter(colorCopyProgram, gl.LINK_STATUS)) {
          console.error(gl.getProgramInfoLog(colorCopyProgram));
          gl.deleteProgram(colorCopyProgram);
          colorCopyProgram = null;
          return null;
        }

        colorCopyTextureUniform =
            gl.getUniformLocation(colorCopyProgram, 'colorTexture');
        return colorCopyProgram;
      }

      // Drops app-owned color-pass buffers when a new immersive session is configured.
      function resetColorTargets() {
        if (colorMsaaColorRenderbuffer) {
          gl.deleteRenderbuffer(colorMsaaColorRenderbuffer);
        }
        if (colorMsaaDepthRenderbuffer) {
          gl.deleteRenderbuffer(colorMsaaDepthRenderbuffer);
        }
        if (colorOffscreenTexture) {
          gl.deleteTexture(colorOffscreenTexture);
        }
        if (colorDepthRenderbuffer) {
          gl.deleteRenderbuffer(colorDepthRenderbuffer);
        }

        colorMsaaColorRenderbuffer = null;
        colorMsaaDepthRenderbuffer = null;
        colorMsaaWidth = 0;
        colorMsaaHeight = 0;
        colorMsaaSamples = 0;
        colorOffscreenTexture = null;
        colorOffscreenWidth = 0;
        colorOffscreenHeight = 0;
        colorDepthRenderbuffer = null;
        colorDepthRenderbufferWidth = 0;
        colorDepthRenderbufferHeight = 0;
      }

      // Attaches a texture array to the current draw framebuffer using the multiview extension.
      function attachMultiviewTexture(attachment, texture, viewCount, msaa) {
        if (msaa) {
          multiviewExtension.framebufferTextureMultisampleMultiviewOVR(
              gl.DRAW_FRAMEBUFFER,
              attachment,
              texture,
              0,
              renderer.maxSamples,
              0,
              viewCount);
        } else {
          multiviewExtension.framebufferTextureMultiviewOVR(
              gl.DRAW_FRAMEBUFFER,
              attachment,
              texture,
              0,
              0,
              viewCount);
        }
      }

      // Returns the depth/motion viewport, which may differ from the color viewport.
      function getDepthStencilViewport(glLayer) {
        return {
          x: 0,
          y: 0,
          width: glLayer.depthStencilTextureWidth || glLayer.viewport.width,
          height: glLayer.depthStencilTextureHeight || glLayer.viewport.height
        };
      }

      // Returns the full color texture size used for non-multiview direct layer attachment.
      function getColorTextureSize(glLayer) {
        return {
          width: glLayer.colorTextureWidth ||
              glLayer.viewport.x + glLayer.viewport.width,
          height: glLayer.colorTextureHeight ||
              glLayer.viewport.y + glLayer.viewport.height
        };
      }

      // Invalidates app-owned color-pass depth and optionally detaches it before resolving or handing off.
      function discardFramebufferDepth(framebuffer, detachDepth = false) {
        gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, framebuffer);
        gl.invalidateFramebuffer(gl.DRAW_FRAMEBUFFER, [gl.DEPTH_ATTACHMENT]);
        if (detachDepth) {
          gl.framebufferRenderbuffer(
              gl.DRAW_FRAMEBUFFER,
              gl.DEPTH_ATTACHMENT,
              gl.RENDERBUFFER,
              null);
        }
      }

      // Copies the resolved MSAA color texture into one XR texture-array layer.
      function copyColorOffscreenTextureToTextureLayer(colorTexture, layerIndex, size) {
        const copyProgram = ensureColorCopyProgram();
        if (!colorOffscreenTexture || !copyProgram) {
          return;
        }

        gl.bindFramebuffer(gl.READ_FRAMEBUFFER, null);
        gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, colorFramebuffer);
        gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
        gl.framebufferTextureLayer(
            gl.DRAW_FRAMEBUFFER,
            gl.COLOR_ATTACHMENT0,
            colorTexture,
            0,
            layerIndex);
        gl.framebufferRenderbuffer(
            gl.DRAW_FRAMEBUFFER,
            gl.DEPTH_ATTACHMENT,
            gl.RENDERBUFFER,
            null);
        if (!checkDrawFramebuffer('color copy')) {
          return;
        }

        gl.disable(gl.BLEND);
        gl.disable(gl.CULL_FACE);
        gl.disable(gl.DEPTH_TEST);
        gl.disable(gl.SCISSOR_TEST);
        gl.disable(gl.STENCIL_TEST);
        gl.depthMask(false);
        gl.colorMask(true, true, true, true);
        gl.viewport(0, 0, size.width, size.height);
        gl.useProgram(copyProgram);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, colorOffscreenTexture);
        gl.uniform1i(colorCopyTextureUniform, 0);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        gl.depthMask(true);
      }

      // Resolves the non-multiview MSAA color buffer before copying it to the XR layer.
      function resolveColorMsaaToTextureLayer(colorTexture, layerIndex, size) {
        if (!ensureColorOffscreenFramebuffer(size.width, size.height)) {
          return;
        }

        gl.bindFramebuffer(gl.READ_FRAMEBUFFER, colorMsaaFramebuffer);
        gl.readBuffer(gl.COLOR_ATTACHMENT0);
        gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, colorFramebuffer);
        gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
        if (!checkDrawFramebuffer('color resolve')) {
          return;
        }
        gl.blitFramebuffer(
            0,
            0,
            size.width,
            size.height,
            0,
            0,
            size.width,
            size.height,
            gl.COLOR_BUFFER_BIT,
            gl.NEAREST);

        copyColorOffscreenTextureToTextureLayer(colorTexture, layerIndex, size);
      }

      // Binds the color-pass framebuffer for multiview, MSAA, or direct non-multiview rendering.
      function bindColorRenderTarget(
          glLayer,
          viewCount,
          colorSize,
          multiview,
          layerIndex) {
        if (multiview) {
          const depthTexture = ensureColorDepthTexture(
              colorSize.width,
              colorSize.height,
              viewCount);

          gl.bindFramebuffer(gl.FRAMEBUFFER, colorFramebuffer);
          attachMultiviewTexture(
              gl.COLOR_ATTACHMENT0,
              glLayer.colorTexture,
              viewCount,
              renderer.multisampledMultiview);
          attachMultiviewTexture(
              gl.DEPTH_ATTACHMENT,
              depthTexture,
              viewCount,
              renderer.multisampledMultiview);
          return true;
        }

        if (colorPassUsesMsaa) {
          const targetFramebuffer =
              ensureColorMsaaFramebuffer(colorSize.width, colorSize.height);
          if (!targetFramebuffer) {
            return false;
          }

          gl.bindFramebuffer(gl.FRAMEBUFFER, targetFramebuffer);
          return true;
        }

        const depthRenderbuffer =
            ensureColorDepthRenderbuffer(colorSize.width, colorSize.height);
        if (!colorFramebuffer || !depthRenderbuffer) {
          return false;
        }

        gl.bindFramebuffer(gl.FRAMEBUFFER, colorFramebuffer);
        gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
        gl.framebufferTextureLayer(
            gl.FRAMEBUFFER,
            gl.COLOR_ATTACHMENT0,
            glLayer.colorTexture,
            0,
            layerIndex);
        gl.framebufferRenderbuffer(
            gl.FRAMEBUFFER,
            gl.DEPTH_ATTACHMENT,
            gl.RENDERBUFFER,
            depthRenderbuffer);
        return true;
      }

      // Finishes a non-multiview color pass by discarding depth and resolving MSAA when needed.
      function finishColorPass(glLayer, layerIndex, colorSize) {
        if (colorPassUsesMsaa) {
          discardFramebufferDepth(colorMsaaFramebuffer, true);
          resolveColorMsaaToTextureLayer(
              glLayer.colorTexture,
              layerIndex,
              colorSize);
        } else {
          discardFramebufferDepth(colorFramebuffer, true);
        }
      }

      // Renders the color pass without writing the optional Space Warp depthStencilTexture.
      function renderColorAndDepth(session, pose) {
        if (!pose || !renderer) {
          return;
        }

        const layer = session.renderState.layers[0];
        const multiview = !!renderer.multiview;
        const views = [];

        for (let i = 0; i < pose.views.length; ++i) {
          const view = pose.views[i];
          const glLayer = xrGLFactory.getViewSubImage(layer, view);

          const viewport = glLayer.viewport;
          const colorSize = getColorTextureSize(glLayer);
          const layerIndex = glLayer.imageIndex ?? i;

          // Multiview attaches the texture array once and draws both eyes in one
          // renderer call, so only the first view performs framebuffer setup.
          if (multiview && i != 0) {
            views.push(new WebXRView(view, glLayer, viewport));
            continue;
          }

          // Non-multiview binds one texture-array layer per eye. MSAA uses an
          // app-owned multisample buffer first; non-MSAA renders to the layer directly.
          if (!bindColorRenderTarget(
              glLayer,
              pose.views.length,
              colorSize,
              multiview,
              layerIndex)) {
            return;
          }

          if (!checkDrawFramebuffer('color')) {
            return;
          }

          gl.disable(gl.SCISSOR_TEST);
          gl.viewport(
              viewport.x,
              viewport.y,
              viewport.width,
              viewport.height);
          gl.clearColor(0.1, 0.2, 0.3, 1.0);
          gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

          const renderView = new WebXRView(view, glLayer, viewport);
          if (multiview) {
            // Defer drawing until both views are collected for the multiview renderer.
            views.push(renderView);
          } else {
            scene.drawViewArray([renderView]);
            // The color pass depth is app-owned. Discard it before the optional
            // Space Warp depthStencilTexture pass.
            finishColorPass(
                glLayer,
                layerIndex,
                colorSize);
          }
        }

        if (multiview) {
          scene.drawViewArray(views);
          // This depth texture is only for the color pass and must not be used
          // as the projection layer's optional Space Warp depthStencilTexture.
          discardFramebufferDepth(colorFramebuffer);
        }
      }

      // Renders motion vectors and the Space Warp depthStencilTexture after the color pass.
      function renderMotionAndDepth(session, pose) {
        if (!pose || !motionRenderer) {
          return;
        }

        const layer = session.renderState.layers[0];
        const multiview = !!motionRenderer.multiview;
        const frameId = motionRenderer._frameId;
        const motionViews = [];

        for (let i = 0; i < pose.views.length; ++i) {
          const view = pose.views[i];
          const glLayer = xrGLFactory.getViewSubImage(layer, view);
          if (!glLayer.motionVectorTexture || !glLayer.depthStencilTexture) {
            return;
          }

          const motionViewport = getDepthStencilViewport(glLayer);

          gl.bindFramebuffer(gl.FRAMEBUFFER, xrMotionFramebuffer);
          if (multiview) {
            if (i != 0) {
              const motionView = new WebXRView(view, glLayer, motionViewport);
              const previous = previousMatrices[i];
              motionView.previousProjectionMatrix =
                  previous ? previous.projectionMatrix : motionView.projectionMatrix;
              motionView.previousViewMatrix =
                  previous ? previous.viewMatrix : motionView.viewMatrix;
              motionViews.push(motionView);
              continue;
            }

            multiviewExtension.framebufferTextureMultiviewOVR(
                gl.DRAW_FRAMEBUFFER,
                gl.COLOR_ATTACHMENT0,
                glLayer.motionVectorTexture,
                0,
                0,
                pose.views.length);
            multiviewExtension.framebufferTextureMultiviewOVR(
                gl.DRAW_FRAMEBUFFER,
                gl.DEPTH_ATTACHMENT,
                glLayer.depthStencilTexture,
                0,
                0,
                pose.views.length);
          } else {
            const layerIndex = glLayer.imageIndex ?? i;
            gl.framebufferTextureLayer(
                gl.DRAW_FRAMEBUFFER,
                gl.COLOR_ATTACHMENT0,
                glLayer.motionVectorTexture,
                0,
                layerIndex);
            gl.framebufferTextureLayer(
                gl.DRAW_FRAMEBUFFER,
                gl.DEPTH_ATTACHMENT,
                glLayer.depthStencilTexture,
                0,
                layerIndex);
          }

          gl.viewport(
              motionViewport.x,
              motionViewport.y,
              motionViewport.width,
              motionViewport.height);
          gl.disable(gl.SCISSOR_TEST);
          gl.clearColor(0.0, 0.0, 0.0, 0.0);

          if (!checkDrawFramebuffer('motion')) {
            return;
          }

          gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

          const motionView = new WebXRView(view, glLayer, motionViewport);
          const previous = previousMatrices[i];
          motionView.previousProjectionMatrix =
              previous ? previous.projectionMatrix : motionView.projectionMatrix;
          motionView.previousViewMatrix =
              previous ? previous.viewMatrix : motionView.viewMatrix;
          if (multiview) {
            motionViews.push(motionView);
          } else {
            motionRenderer._frameId = frameId;
            motionScene.drawViewArray([motionView]);
            previousMatrices[i] = {
              projectionMatrix: mat4.clone(motionView.projectionMatrix),
              viewMatrix: mat4.clone(motionView.viewMatrix)
            };
          }
        }

        if (!multiview) {
          motionRenderer._frameId = frameId + 1;
          return;
        }

        motionScene.drawViewArray(motionViews);

        for (let i = 0; i < motionViews.length; ++i) {
          previousMatrices[i] = {
            projectionMatrix: mat4.clone(motionViews[i].projectionMatrix),
            viewMatrix: mat4.clone(motionViews[i].viewMatrix)
          };
        }
      }

      // Advances interaction state and renders one inline or immersive XR frame.
      function onXRFrame(t, frame) {
        let session = frame.session;
        let refSpace = session.isImmersive ?
                         xrImmersiveRefSpace :
                         inlineViewerHelper.referenceSpace;
        let pose = frame.getViewerPose(refSpace);

        scene.startFrame();
        if (session.isImmersive && spaceWarpEnabled) {
          motionScene.startFrame();
        }

        session.requestAnimationFrame(onXRFrame);

        updateGrabbedShapes(frame, refSpace);
        updateShapeMatrices(shapes, t);
        scene.updateInputSources(frame, refSpace);
        if (session.isImmersive && spaceWarpEnabled) {
          updateShapeMatrices(motionShapes, t, shapes);
          motionScene.updateInputSources(frame, refSpace);
        }

        gl.clearColor(0.1, 0.2, 0.3, 1.0);
        if (session.isImmersive) {
          renderColorAndDepth(session, pose);
          if (spaceWarpEnabled) {
            renderMotionAndDepth(session, pose);
          }
        } else {
          scene.drawXRFrame(frame, pose);
        }

        scene.endFrame();
        if (session.isImmersive && spaceWarpEnabled) {
          motionScene.endFrame();
        }
      }

      // Start the XR application.
      initXR();
    </script>
  </body>
