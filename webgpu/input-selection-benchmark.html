struct FrameUniforms {
  projectionMatrix: mat4x4f,
  viewMatrix: mat4x4f,
  lightDirection: vec3f,
  _pad0: f32,
  lightColor: vec3f,
  _pad1: f32,
  cameraPosition: vec3f,
  _pad2: f32,
};
@group(0) @binding(0) var<uniform> frame: FrameUniforms;

struct ModelUniforms {
  modelMatrix: mat4x4f,
};
@group(1) @binding(0) var<uniform> model: ModelUniforms;

struct MaterialUniforms {
  laserColor: vec4f,
};
@group(2) @binding(0) var<uniform> material: MaterialUniforms;
@group(2) @binding(1) var materialSampler: sampler;
@group(2) @binding(2) var laserTexture: texture_2d<f32>;

struct VertexInput {
  @location(0) position: vec3f,
  @location(3) texcoord: vec2f,
};

struct VertexOutput {
  @builtin(position) position: vec4f,
  @location(0) vTexCoord: vec2f,
};

@vertex
fn vs_main(input: VertexInput) -> VertexOutput {
  var output: VertexOutput;
  output.vTexCoord = input.texcoord;
  output.position = frame.projectionMatrix * frame.viewMatrix * model.modelMatrix * vec4f(input.position, 1.0);
  return output;
}

const fadePoint: f32 = ${LASER_FADE_POINT};
const fadeEnd: f32 = ${LASER_FADE_END};

@fragment
fn fs_main(input: VertexOutput) -> @location(0) vec4f {
  let uv = input.vTexCoord;
  let front_fade_factor = 1.0 - clamp(1.0 - (uv.y - fadePoint) / (1.0 - fadePoint), 0.0, 1.0);
  let back_fade_factor = clamp((uv.y - fadePoint) / (fadeEnd - fadePoint), 0.0, 1.0);
  let color = material.laserColor * textureSample(laserTexture, materialSampler, uv);
  let opacity = color.a * front_fade_factor * back_fade_factor;
  return vec4f(color.rgb * opacity, opacity);
}
`;

      const FRAGMENT_STRESS_WGSL = `
struct FrameUniforms {
  projectionMatrix: mat4x4f,
  viewMatrix: mat4x4f,
  lightDirection: vec3f,
  _pad0: f32,
  lightColor: vec3f,
  _pad1: f32,
  cameraPosition: vec3f,
  _pad2: f32,
};
@group(0) @binding(0) var<uniform> frame: FrameUniforms;

struct ModelUniforms {
  modelMatrix: mat4x4f,
};
@group(1) @binding(0) var<uniform> model: ModelUniforms;

struct MaterialUniforms {
  baseColorFactor: vec4f,
  metallicRoughness: vec4f,
  occlusion: vec4f,
  emissive: vec4f,
};
@group(2) @binding(0) var<uniform> material: MaterialUniforms;

struct VertexInput {
  @location(0) position: vec3f,
  @location(1) normal: vec3f,
  @location(3) texcoord: vec2f,
};

struct VertexOutput {
  @builtin(position) position: vec4f,
  @location(0) vNormal: vec3f,
  @location(1) vLight: vec3f,
  @location(2) vView: vec3f,
  @location(3) vTex: vec2f,
};

@vertex
fn vs_main(input: VertexInput) -> VertexOutput {
  var output: VertexOutput;
  let modelPos = model.modelMatrix * vec4f(input.position, 1.0);
  output.position = frame.projectionMatrix * frame.viewMatrix * modelPos;
  output.vNormal = normalize((model.modelMatrix * vec4f(input.normal, 0.0)).xyz);
  output.vLight = -frame.lightDirection;
  output.vView = frame.cameraPosition - modelPos.xyz;
  output.vTex = input.texcoord;
  return output;
}

@fragment
fn fs_main(input: VertexOutput) -> @location(0) vec4f {
  let n = normalize(input.vNormal);
  let l = normalize(input.vLight);
  let v = normalize(input.vView);
  let h = normalize(l + v);
  var color = material.baseColorFactor.rgb * (0.35 + 0.65 * max(dot(n, l), 0.0));
  let specular = pow(max(dot(n, h), 0.0), 28.0);
  var p = input.vTex * 10.0 + n.xy * 2.0;
  var pattern = 0.0;

  // Procedural work keeps the stress scene more fragment-bound than plain PBR.
  for (var i = 0; i < 6; i = i + 1) {
    let fi = f32(i);
    let q = p + vec2f(
        sin(fi * 1.37 + p.y * 0.61),
        cos(fi * 1.91 + p.x * 0.53));
    let wave = sin(q.x * (1.2 + fi * 0.035) + q.y * (0.8 + fi * 0.027));
    let ridge = abs(cos(dot(q, vec2f(0.73, 1.21)) + fi * 0.29));
    pattern = pattern + sin(wave * ridge * 3.14159 + fi * 0.17) * 0.5 + 0.5;
    p = mat2x2f(0.9659, -0.2588, 0.2588, 0.9659) * p + n.yz * 0.015;
  }

  pattern = pattern / 6.0;
  let procedural = vec3f(
      pattern,
      pattern * pattern,
      sqrt(max(pattern, 0.0)));
  color = mix(color, color * procedural * 1.6, 0.5);
  color = color + vec3f(specular);
  return vec4f(color, material.baseColorFactor.a);
}
`;

      const MOTION_VECTOR_WGSL = `
struct FrameUniforms {
  projectionMatrix: mat4x4f,
  viewMatrix: mat4x4f,
  previousProjectionMatrix: mat4x4f,
  previousViewMatrix: mat4x4f,
};
@group(0) @binding(0) var<uniform> frame: FrameUniforms;

struct ModelUniforms {
  modelMatrix: mat4x4f,
  previousModelMatrix: mat4x4f,
};
@group(1) @binding(0) var<uniform> model: ModelUniforms;

struct MaterialUniforms {
  baseColorFactor: vec4f,
  metallicRoughness: vec4f,
  occlusion: vec4f,
  emissive: vec4f,
};
@group(2) @binding(0) var<uniform> material: MaterialUniforms;
@group(2) @binding(1) var materialSampler: sampler;
@group(2) @binding(2) var baseColorTexture: texture_2d<f32>;

struct VertexInput {
  @location(0) position: vec3f,
  @location(1) normal: vec3f,
  @location(3) texcoord: vec2f,
};

struct VertexOutput {
  @builtin(position) position: vec4f,
  @location(0) currentClipPosition: vec4f,
  @location(1) previousClipPosition: vec4f,
};

@vertex
fn vs_main(input: VertexInput) -> VertexOutput {
  var output: VertexOutput;
  let currentModelPosition = model.modelMatrix * vec4f(input.position, 1.0);
  let previousModelPosition =
      model.previousModelMatrix * vec4f(input.position, 1.0);
  output.currentClipPosition =
      frame.projectionMatrix * frame.viewMatrix * currentModelPosition;
  output.previousClipPosition =
      frame.previousProjectionMatrix * frame.previousViewMatrix *
      previousModelPosition;
  output.position = output.currentClipPosition;
  return output;
}

@fragment
fn fs_main(input: VertexOutput) -> @location(0) vec4f {
  let currentNdc =
      input.currentClipPosition.xyz / input.currentClipPosition.w;
  let previousNdc =
      input.previousClipPosition.xyz / input.previousClipPosition.w;
  let motionVector = currentNdc - previousNdc;
  return vec4f(motionVector, 0.0);
}
`;

      const RIPPLE_COMPUTE_WGSL = `
struct RippleParams {
  time: f32,
  vertexCount: f32,
  amplitude: f32,
  frequency: f32,
  speed: f32,
  phase: f32,
  _pad0: f32,
  _pad1: f32,
};
@group(0) @binding(0) var<storage, read> baseVertices: array<vec4f>;
@group(0) @binding(1) var<storage, read_write> animatedVertices: array<vec4f>;
@group(0) @binding(2) var<uniform> params: RippleParams;

@compute @workgroup_size(${RIPPLE_WORKGROUP_SIZE})
fn main(@builtin(global_invocation_id) globalId: vec3u) {
  let vertexIndex = globalId.x;
  if (f32(vertexIndex) >= params.vertexCount) {
    return;
  }

  let offset = vertexIndex * 2u;
  let base0 = baseVertices[offset];
  let base1 = baseVertices[offset + 1u];
  let position = base0.xyz;
  let normal = normalize(base1.yzw);
  let wavePhase =
      dot(position, vec3f(11.7, 7.9, 5.3)) * params.frequency +
      params.time * params.speed +
      params.phase;
  let wave =
      sin(wavePhase) +
      0.45 * sin(wavePhase * 1.73 + position.y * 13.0);
  let animatedPosition = position + normal * wave * params.amplitude;

  animatedVertices[offset] = vec4f(animatedPosition, base0.w);
  animatedVertices[offset + 1u] = base1;
}
`;

      class DepthStoringGPURenderer extends GPURenderer {
        constructor(device, colorFormat, options = {}) {
          super(device, colorFormat, options);

          this._frameData = new Float32Array(MOTION_FRAME_UNIFORM_SIZE / 4);
          this._modelData = new Float32Array(MOTION_MODEL_UNIFORM_SIZE / 4);
          this._frameUniforms = [];
          this._modelUniforms = [];
          this._modelUniformIndex = 0;
          this._pipelineCache = {};

          this._frameBindGroupLayout = device.createBindGroupLayout({
            entries: [
              {
                binding: 0,
                visibility: GPUShaderStage.VERTEX,
                buffer: {type: 'uniform'},
              },
            ],
          });
          this._modelBindGroupLayout = device.createBindGroupLayout({
            entries: [
              {
                binding: 0,
                visibility: GPUShaderStage.VERTEX,
                buffer: {type: 'uniform'},
              },
            ],
          });
          this._pipelineLayout = device.createPipelineLayout({
            bindGroupLayouts: [
              this._frameBindGroupLayout,
              this._modelBindGroupLayout,
              this._materialBindGroupLayout,
            ],
          });
        }

        _getFrameUniform(viewIndex) {
          if (viewIndex < this._frameUniforms.length) {
            return this._frameUniforms[viewIndex];
          }

          const buffer = this._device.createBuffer({
            size: MOTION_FRAME_UNIFORM_SIZE,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
          });
          const bindGroup = this._device.createBindGroup({
            layout: this._frameBindGroupLayout,
            entries: [
              {binding: 0, resource: {buffer}},
            ],
          });
          const frameUniform = {buffer, bindGroup};
          this._frameUniforms.push(frameUniform);
          return frameUniform;
        }

        _getModelUniform() {
          if (this._modelUniformIndex < this._modelUniforms.length) {
            return this._modelUniforms[this._modelUniformIndex++];
          }

          const buffer = this._device.createBuffer({
            size: MOTION_MODEL_UNIFORM_SIZE,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
          });
          const bindGroup = this._device.createBindGroup({
            layout: this._modelBindGroupLayout,
            entries: [
              {binding: 0, resource: {buffer}},
            ],
          });
          const modelUniform = {buffer, bindGroup};
          this._modelUniforms.push(modelUniform);
          this._modelUniformIndex++;
          return modelUniform;
        }

        _prepareMotionVectorInstance(instance) {
          if (instance._motionVectorFrameId == this._frameId) {
            return;
          }

          if (!instance._motionVectorPreviousWorldMatrix) {
            instance._motionVectorPreviousWorldMatrix =
                mat4.clone(instance.worldMatrix);
            instance._motionVectorCurrentWorldMatrix =
                mat4.clone(instance.worldMatrix);
          } else {
            mat4.copy(
                instance._motionVectorPreviousWorldMatrix,
                instance._motionVectorCurrentWorldMatrix);
            mat4.copy(
                instance._motionVectorCurrentWorldMatrix,
                instance.worldMatrix);
          }
          instance._motionVectorFrameId = this._frameId;
        }

        drawViews(views, rootNode) {
          if (!rootNode) {
            return;
          }

          this._frameId++;
          this._modelUniformIndex = 0;
          rootNode.markActive(this._frameId);

          for (let i = 0; i < views.length; ++i) {
            if (this._cameraPositions.length <= i) {
              this._cameraPositions.push(vec3.create());
            }
            let p = views[i].viewTransform.position;
            this._cameraPositions[i][0] = p.x;
            this._cameraPositions[i][1] = p.y;
            this._cameraPositions[i][2] = p.z;
          }

          let commandEncoder = this._device.createCommandEncoder();
          let encodedPass = false;

          for (let vi = 0; vi < views.length; ++vi) {
            let view = views[vi];
            if (!view._colorView || !view._depthView) {
              continue;
            }

            let frameData = this._frameData;
            frameData.set(view.projectionMatrix, 0);
            frameData.set(view.viewMatrix, 16);
            frameData.set(
                view.previousProjectionMatrix || view.projectionMatrix,
                32);
            frameData.set(view.previousViewMatrix || view.viewMatrix, 48);
            let frameUniform = this._getFrameUniform(vi);
            this._device.queue.writeBuffer(frameUniform.buffer, 0, frameData);

            let passEncoder = commandEncoder.beginRenderPass({
              colorAttachments: [{
                view: view._colorView,
                loadOp: 'clear',
                storeOp: 'store',
                clearValue: {r: 0, g: 0, b: 0, a: 0},
              }],
              depthStencilAttachment: {
                view: view._depthView,
                depthLoadOp: 'clear',
                depthClearValue: 1.0,
                depthStoreOp: 'store',
              },
            });

            if (view.viewport) {
              let vp = view.viewport;
              passEncoder.setViewport(vp.x, vp.y, vp.width, vp.height, 0.0, 1.0);
            }

            passEncoder.setBindGroup(0, frameUniform.bindGroup);
            for (let renderPrimitives of this._renderPrimitives) {
              if (renderPrimitives && renderPrimitives.length) {
                this._drawPrimitives(passEncoder, renderPrimitives);
              }
            }

            passEncoder.end();
            encodedPass = true;
          }

          if (encodedPass) {
            this._device.queue.submit([commandEncoder.finish()]);
          }
        }

        _drawPrimitives(passEncoder, renderPrimitives) {
          for (let primitive of renderPrimitives) {
            if (primitive._activeFrameId != this._frameId) {
              continue;
            }
            if (!primitive._pipeline || !primitive._elementCount) {
              continue;
            }

            passEncoder.setPipeline(primitive._pipeline);

            for (let i = 0; i < primitive._attributeBuffers.length; ++i) {
              const attributeBuffer = primitive._attributeBuffers[i];
              if (attributeBuffer.buffer && attributeBuffer.buffer._buffer) {
                passEncoder.setVertexBuffer(i, attributeBuffer.buffer._buffer);
              }
            }

            let indexed = false;
            if (primitive._indexBuffer && primitive._indexBuffer._buffer) {
              const indexFormat =
                  primitive._indexType === 5125 ? 'uint32' : 'uint16';
              passEncoder.setIndexBuffer(
                  primitive._indexBuffer._buffer,
                  indexFormat,
                  primitive._indexByteOffset);
              indexed = true;
            }

            passEncoder.setBindGroup(
                2,
                this._createMaterialBindGroup(primitive._material));

            for (let instance of primitive._instances) {
              if (instance._activeFrameId != this._frameId) {
                continue;
              }

              this._prepareMotionVectorInstance(instance);

              const modelData = this._modelData;
              modelData.set(instance.worldMatrix, 0);
              modelData.set(instance._motionVectorPreviousWorldMatrix, 16);

              const modelUniform = this._getModelUniform();
              this._device.queue.writeBuffer(
                  modelUniform.buffer,
                  0,
                  modelData);
              passEncoder.setBindGroup(1, modelUniform.bindGroup);

              if (indexed) {
                passEncoder.drawIndexed(primitive._elementCount);
              } else {
                passEncoder.draw(primitive._elementCount);
              }
            }
          }
        }
      }

      class RippleAnimator {
        constructor(device) {
          this.device = device;
          this.primitives = [];
          this.paramData = new Float32Array(8);
          this.elapsedTime = 0;
          this.lastUpdateTimestamp = 0;
          this.pipeline = device.createComputePipeline({
            layout: 'auto',
            compute: {
              module: device.createShaderModule({code: RIPPLE_COMPUTE_WGSL}),
              entryPoint: 'main',
            },
          });
          this.bindGroupLayout = this.pipeline.getBindGroupLayout(0);
        }

        createBuffer(data, usage) {
          const buffer = this.device.createBuffer({
            size: Math.ceil(data.byteLength / 4) * 4,
            usage,
            mappedAtCreation: true,
          });
          new Uint8Array(buffer.getMappedRange()).set(
              new Uint8Array(data.buffer, data.byteOffset, data.byteLength));
          buffer.unmap();
          return buffer;
        }

        createPrimitive(renderer, stream, phase) {
          const vertices = new Float32Array(stream._vertices);
          const indices = new Uint16Array(stream._indices);
          const vertexCount = vertices.length / 8;
          const baseBuffer = this.createBuffer(
              vertices,
              GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST);
          const animatedBuffer = this.createBuffer(
              vertices,
              GPUBufferUsage.STORAGE | GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST);
          const paramBuffer = this.device.createBuffer({
            size: this.paramData.byteLength,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
          });
          const bindGroup = this.device.createBindGroup({
            layout: this.bindGroupLayout,
            entries: [
              {binding: 0, resource: {buffer: baseBuffer}},
              {binding: 1, resource: {buffer: animatedBuffer}},
              {binding: 2, resource: {buffer: paramBuffer}},
            ],
          });

          const vertexBuffer = {
            _buffer: animatedBuffer,
            _length: vertices.byteLength,
          };
          const indexBuffer = renderer.createRenderBuffer(indices, 'index');
          const attribs = [
            new PrimitiveAttribute('POSITION', vertexBuffer, 3, 5126, 32, 0),
            new PrimitiveAttribute('TEXCOORD_0', vertexBuffer, 2, 5126, 32, 12),
            new PrimitiveAttribute('NORMAL', vertexBuffer, 3, 5126, 32, 20),
          ];
          const primitive = new Primitive(attribs, indices.length);
          primitive.setIndexBuffer(indexBuffer);
          primitive.setBounds(
              [
                stream._min[0] - RIPPLE_AMPLITUDE * 2.0,
                stream._min[1] - RIPPLE_AMPLITUDE * 2.0,
                stream._min[2] - RIPPLE_AMPLITUDE * 2.0
              ],
              [
                stream._max[0] + RIPPLE_AMPLITUDE * 2.0,
                stream._max[1] + RIPPLE_AMPLITUDE * 2.0,
                stream._max[2] + RIPPLE_AMPLITUDE * 2.0
              ]);

          this.primitives.push({
            bindGroup,
            paramBuffer,
            vertexCount,
            phase,
            frequency: 7.0,
            speed: 7.5,
          });
          return primitive;
        }

        update() {
          if (!this.primitives.length) {
            return;
          }

          const timestamp = performance.now();
          if (this.lastUpdateTimestamp > 0) {
            const deltaSeconds =
                Math.min(0.05, Math.max(0.0, (timestamp - this.lastUpdateTimestamp) / 1000.0));
            this.elapsedTime += deltaSeconds;
          }
          this.lastUpdateTimestamp = timestamp;

          for (let primitive of this.primitives) {
            this.paramData[0] = this.elapsedTime;
            this.paramData[1] = primitive.vertexCount;
            this.paramData[2] = RIPPLE_AMPLITUDE;
            this.paramData[3] = primitive.frequency;
            this.paramData[4] = primitive.speed;
            this.paramData[5] = primitive.phase;
            this.paramData[6] = 0;
            this.paramData[7] = 0;
            this.device.queue.writeBuffer(
                primitive.paramBuffer,
                0,
                this.paramData);
          }

          const commandEncoder = this.device.createCommandEncoder();
          const passEncoder = commandEncoder.beginComputePass();
          passEncoder.setPipeline(this.pipeline);
          for (let primitive of this.primitives) {
            passEncoder.setBindGroup(0, primitive.bindGroup);
            passEncoder.dispatchWorkgroups(
                Math.ceil(primitive.vertexCount / RIPPLE_WORKGROUP_SIZE));
          }
          passEncoder.end();
          this.device.queue.submit([commandEncoder.finish()]);
        }
      }

      function orthoZO(out, left, right, bottom, top, near, far) {
        const lr = 1.0 / (right - left);
        const bt = 1.0 / (top - bottom);
        const nf = 1.0 / (near - far);

        out[0] = 2.0 * lr;
        out[1] = 0;
        out[2] = 0;
        out[3] = 0;
        out[4] = 0;
        out[5] = 2.0 * bt;
        out[6] = 0;
        out[7] = 0;
        out[8] = 0;
        out[9] = 0;
        out[10] = nf;
        out[11] = 0;
        out[12] = -(right + left) * lr;
        out[13] = -(top + bottom) * bt;
        out[14] = near * nf;
        out[15] = 1;
        return out;
      }

      function getShapeCount() {
        const count = Number.parseInt(shapeCountControl.value, 10);
        if (!Number.isFinite(count)) {
          return DEFAULT_SHAPE_COUNT;
        }
        return Math.min(MAX_SHAPE_COUNT, Math.max(MIN_SHAPE_COUNT, count));
      }

      function setShapeCount(count) {
        shapeCountControl.value = Math.min(MAX_SHAPE_COUNT, Math.max(MIN_SHAPE_COUNT, count));
        syncShapeCount();
      }

      function applyShapeCountToShapeList(shapeList, count) {
        for (let i = 0; i < shapeList.length; ++i) {
          const shape = shapeList[i];
          const active = i < count;
          if (!active) {
            shape.selected = false;
            shape.grabbed = false;
            shape.originalPos = null;
            shape.position = shape.homePosition.slice();
            shape.scale = [1, 1, 1];
          } else if (!shape.active) {
            shape.position = shape.homePosition.slice();
            shape.scale = [1, 1, 1];
          }

          shape.active = active;
          shape.node.visible = active;
          shape.node.selectable = active;
        }
      }

      function applyShapeCountToShapes(count) {
        applyShapeCountToShapeList(shapes, count);
        applyShapeCountToShapeList(motionShapes, count);
      }

      function syncShapeCount() {
        const count = getShapeCount();
        shapeCountControl.value = count;
        shapeCountValue.textContent = String(count);
        applyShapeCountToShapes(count);

        for (let i = 0; i < currentlySelectedShapes.length; ++i) {
          if (currentlySelectedShapes[i] && !currentlySelectedShapes[i].active) {
            currentlySelectedShapes[i] = null;
          }
          if (currentlyGrabbedShapes[i] && !currentlyGrabbedShapes[i].active) {
            currentlyGrabbedShapes[i] = null;
          }
        }
      }

      function getBenchmarkBaseFrameRate(session) {
        if (Number.isFinite(session.frameRate) && session.frameRate > 0) {
          return session.frameRate;
        }

        return 90;
      }

      function startBenchmarkMeasurement(timestamp) {
        benchmarkState.phase = 'measure';
        benchmarkState.measureStart = timestamp;
        benchmarkState.frameCount = 0;
        benchmarkStatus.textContent =
            `Benchmark: measuring ${benchmarkState.shapeCount} shapes.`;
      }

      function isBenchmarkSession(session) {
        return !!benchmarkState &&
            benchmarkState.session === session;
      }

      function setNodeTreeVisible(node, visible) {
        if (!node) {
          return;
        }

        node.visible = visible;
        for (let child of node.children) {
          setNodeTreeVisible(child, visible);
        }
      }

      function clearPreviousMatrices() {
        for (let key of Object.keys(previousMatrices)) {
          delete previousMatrices[key];
        }
      }

      function finishBenchmark(session, message, resultShapeCount) {
        if (resultShapeCount !== null) {
          setShapeCount(resultShapeCount);
        }

        benchmarkStatus.textContent = message;
        benchmarkState.finished = true;
        session.end().catch((err) => {
          benchmarkStatus.textContent =
              `${message} Failed to exit XR: ${err.message}`;
        });
      }

      function evaluateBenchmarkWindow(session, timestamp) {
        const elapsedMs = timestamp - benchmarkState.measureStart;
        const measuredFps = benchmarkState.frameCount * 1000.0 / elapsedMs;
        const requiredFps = benchmarkState.requiredFps;

        if (measuredFps >= requiredFps) {
          benchmarkState.bestShapeCount = benchmarkState.shapeCount;
          benchmarkState.bestFps = measuredFps;

          if (benchmarkState.shapeCount >= MAX_SHAPE_COUNT) {
            finishBenchmark(
                session,
                `Benchmark result: ${benchmarkState.bestShapeCount} shapes held ` +
                    `${measuredFps.toFixed(1)} fps.`,
                benchmarkState.bestShapeCount);
            return;
          }

          benchmarkState.shapeCount++;
          setShapeCount(benchmarkState.shapeCount);
          startBenchmarkMeasurement(timestamp);
          return;
        }

        if (benchmarkState.bestShapeCount === null) {
          finishBenchmark(
              session,
              `Benchmark result: fewer than ${MIN_SHAPE_COUNT} shapes held ` +
                  `${requiredFps.toFixed(1)} fps.`,
              MIN_SHAPE_COUNT);
          return;
        }

        finishBenchmark(
            session,
            `Benchmark result: ${benchmarkState.bestShapeCount} shapes held ` +
                `${benchmarkState.bestFps.toFixed(1)} fps. ` +
                `${benchmarkState.shapeCount} shapes measured ` +
                `${measuredFps.toFixed(1)} fps.`,
            benchmarkState.bestShapeCount);
      }

      function updateBenchmark(timestamp, session) {
        if (!benchmarkState ||
            benchmarkState.session !== session ||
            benchmarkState.finished) {
          return;
        }

        if (!benchmarkState.targetFps) {
          benchmarkState.baseFps = getBenchmarkBaseFrameRate(session);
          benchmarkState.targetFps = spaceWarpEnabled ?
              benchmarkState.baseFps * 0.5 :
              benchmarkState.baseFps;
          benchmarkState.requiredFps =
              benchmarkState.targetFps * BENCHMARK_KEEPUP_RATIO;
          benchmarkState.warmupStart = timestamp;
          benchmarkState.phase = 'warmup';
          benchmarkStatus.textContent =
              `Benchmark: warming up ${benchmarkState.shapeCount} shapes.`;
          return;
        }

        if (benchmarkState.phase == 'warmup') {
          if (timestamp - benchmarkState.warmupStart >= BENCHMARK_WARMUP_MS) {
            startBenchmarkMeasurement(timestamp);
          }
          return;
        }

        if (benchmarkState.phase != 'measure') {
          return;
        }

        benchmarkState.frameCount++;
        if (timestamp - benchmarkState.measureStart >= BENCHMARK_MEASURE_MS) {
          evaluateBenchmarkWindow(session, timestamp);
        }
      }

      function startBenchmark() {
        if (benchmarkState || (xrButton && xrButton.session)) {
          return;
        }

        setShapeCount(MIN_SHAPE_COUNT);
        currentlySelectedShapes = [null, null];
        currentlyGrabbedShapes = [null, null];
        benchmarkState = {
          session: null,
          phase: 'requesting',
          shapeCount: MIN_SHAPE_COUNT,
          bestShapeCount: null,
          bestFps: 0,
          baseFps: 0,
          targetFps: 0,
          requiredFps: 0,
          warmupStart: 0,
          measureStart: 0,
          frameCount: 0,
          finished: false,
        };
        benchmarkStatus.textContent = 'Benchmark: starting XR session.';
        updateFeatureControls();

        onRequestSession().catch((err) => {
          benchmarkStatus.textContent =
              `Benchmark failed to start: ${err.message}`;
          benchmarkState = null;
          updateFeatureControls();
        });
      }

      function createLaserMesh(renderer) {
        let lr = LASER_DIAMETER * 0.5;
        let ll = LASER_LENGTH;

        let laserVerts = new Float32Array([
        // X    Y     Z     U    V
          0.0,  lr,  0.0,  0.0, 1.0,
          0.0,  lr,  -ll,  0.0, 0.0,
          0.0, -lr,  0.0,  1.0, 1.0,
          0.0, -lr,  -ll,  1.0, 0.0,

           lr, 0.0,  0.0,  0.0, 1.0,
           lr, 0.0,  -ll,  0.0, 0.0,
          -lr, 0.0,  0.0,  1.0, 1.0,
          -lr, 0.0,  -ll,  1.0, 0.0,

          0.0, -lr,  0.0,  0.0, 1.0,
          0.0, -lr,  -ll,  0.0, 0.0,
          0.0,  lr,  0.0,  1.0, 1.0,
          0.0,  lr,  -ll,  1.0, 0.0,

          -lr, 0.0,  0.0,  0.0, 1.0,
          -lr, 0.0,  -ll,  0.0, 0.0,
           lr, 0.0,  0.0,  1.0, 1.0,
           lr, 0.0,  -ll,  1.0, 0.0,
        ]);
        let laserIndices = new Uint16Array([
          0, 1, 2, 1, 3, 2,
          4, 5, 6, 5, 7, 6,
          8, 9, 10, 9, 11, 10,
          12, 13, 14, 13, 15, 14,
        ]);

        let vertexBuffer = renderer.createRenderBuffer(laserVerts, 'vertex');
        let indexBuffer = renderer.createRenderBuffer(laserIndices, 'index');

        let attribs = [
          new PrimitiveAttribute('POSITION', vertexBuffer, 3, 5126, 20, 0),
          new PrimitiveAttribute('TEXCOORD_0', vertexBuffer, 2, 5126, 20, 12),
        ];

        let primitive = new Primitive(attribs, laserIndices.length);
        primitive.setIndexBuffer(indexBuffer);

        let material = new LaserGPUMaterial();
        let renderPrimitive = renderer.createRenderPrimitive(primitive, material);
        let meshNode = new Node();
        meshNode.addRenderPrimitive(renderPrimitive);
        return meshNode;
      }

      function createRipplePrimitive(targetRenderer, stream) {
        if (!useRipple.checked) {
          return stream.finishPrimitiveGPU(targetRenderer);
        }

        if (!buildingRippleAnimator) {
          buildingRippleAnimator = new RippleAnimator(targetRenderer.device);
        }

        return buildingRippleAnimator.createPrimitive(
            targetRenderer,
            stream,
            buildingRippleAnimator.primitives.length * 1.37);
      }

      function normalizeVector(x, y, z) {
        const length = Math.sqrt(x * x + y * y + z * z);
        if (length < 0.00001) {
          return [0, 1, 0];
        }

        return [x / length, y / length, z / length];
      }

      function crossVector(a, b) {
        return [
          a[1] * b[2] - a[2] * b[1],
          a[2] * b[0] - a[0] * b[2],
          a[0] * b[1] - a[1] * b[0]
        ];
      }

      function signedPower(value, exponent) {
        return Math.sign(value) * Math.pow(Math.abs(value), exponent);
      }

      function pushParametricSurface(stream, columns, rows, getVertex) {
        const rowStride = columns + 1;

        stream.startGeometry();
        for (let row = 0; row <= rows; ++row) {
          const v = row / rows;
          for (let column = 0; column <= columns; ++column) {
            const u = column / columns;
            const vertex = getVertex(u, v);
            stream.pushVertex(
                vertex[0],
                vertex[1],
                vertex[2],
                u,
                v,
                vertex[3],
                vertex[4],
                vertex[5]);
          }
        }

        for (let row = 0; row < rows; ++row) {
          for (let column = 0; column < columns; ++column) {
            const index = row * rowStride + column;
            stream.pushTriangle(index, index + rowStride, index + 1);
            stream.pushTriangle(index + 1, index + rowStride, index + rowStride + 1);
          }
        }
        stream.endGeometry();
      }

      function createRuffledSpherePrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;
        const radius = 0.26;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = v * Math.PI;
          const sinPhi = Math.sin(phi);
          const ripple =
              1.0 +
              0.09 * Math.sin(theta * 17.0) * Math.sin(phi * 11.0) +
              0.04 * Math.cos(theta * 9.0 + phi * 7.0);
          const r = radius * ripple;
          const x = Math.sin(theta) * sinPhi * r;
          const y = Math.cos(phi) * r;
          const z = Math.cos(theta) * sinPhi * r;
          const normal = normalizeVector(x, y, z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return createRipplePrimitive(targetRenderer, stream);
      }

      function createTorusKnotPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 512;
        const rows = 96;
        const pathScale = 0.105;
        const tubeRadius = 0.035;

        function getCenter(t) {
          return [
            pathScale * (2.0 + Math.cos(3.0 * t)) * Math.cos(2.0 * t),
            pathScale * Math.sin(3.0 * t),
            pathScale * (2.0 + Math.cos(3.0 * t)) * Math.sin(2.0 * t)
          ];
        }

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const t = u * Math.PI * 2.0;
          const center = getCenter(t);
          const next = getCenter(t + 0.01);
          const previous = getCenter(t - 0.01);
          const tangent = normalizeVector(
              next[0] - previous[0],
              next[1] - previous[1],
              next[2] - previous[2]);
          let frameSeed = [0, 1, 0];
          if (Math.abs(tangent[1]) > 0.9) {
            frameSeed = [1, 0, 0];
          }
          const normalAxis = normalizeVector(...crossVector(frameSeed, tangent));
          const binormalAxis = normalizeVector(...crossVector(tangent, normalAxis));
          const angle = v * Math.PI * 2.0;
          const radius = tubeRadius * (1.0 + 0.18 * Math.sin(t * 13.0));
          const nx =
              Math.cos(angle) * normalAxis[0] +
              Math.sin(angle) * binormalAxis[0];
          const ny =
              Math.cos(angle) * normalAxis[1] +
              Math.sin(angle) * binormalAxis[1];
          const nz =
              Math.cos(angle) * normalAxis[2] +
              Math.sin(angle) * binormalAxis[2];
          return [
            center[0] + nx * radius,
            center[1] + ny * radius,
            center[2] + nz * radius,
            nx,
            ny,
            nz
          ];
        });

        return createRipplePrimitive(targetRenderer, stream);
      }

      function pushGearCap(stream, y, normalY, columns, rings, getRadius) {
        stream.startGeometry();
        stream.pushVertex(0, y, 0, 0.5, 0.5, 0, normalY, 0);
        for (let ring = 1; ring <= rings; ++ring) {
          const ringRatio = ring / rings;
          for (let column = 0; column <= columns; ++column) {
            const u = column / columns;
            const theta = u * Math.PI * 2.0;
            const radius = getRadius(theta, u) * ringRatio;
            stream.pushVertex(
                Math.sin(theta) * radius,
                y,
                Math.cos(theta) * radius,
                Math.sin(theta) * ringRatio * 0.5 + 0.5,
                Math.cos(theta) * ringRatio * 0.5 + 0.5,
                0,
                normalY,
                0);
          }
        }

        for (let column = 0; column < columns; ++column) {
          const first = 1 + column;
          if (normalY > 0) {
            stream.pushTriangle(0, first, first + 1);
          } else {
            stream.pushTriangle(0, first + 1, first);
          }
        }

        const rowStride = columns + 1;
        for (let ring = 1; ring < rings; ++ring) {
          const innerStart = 1 + (ring - 1) * rowStride;
          const outerStart = 1 + ring * rowStride;
          for (let column = 0; column < columns; ++column) {
            const inner = innerStart + column;
            const outer = outerStart + column;
            if (normalY > 0) {
              stream.pushTriangle(inner, outer, inner + 1);
              stream.pushTriangle(inner + 1, outer, outer + 1);
            } else {
              stream.pushTriangle(inner, inner + 1, outer);
              stream.pushTriangle(inner + 1, outer + 1, outer);
            }
          }
        }
        stream.endGeometry();
      }

      function createRidgedGearPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 112;
        const rings = 32;
        const height = 0.52;
        const baseRadius = 0.18;
        const toothCount = 28;

        function getRadius(theta, u, v = 0.5) {
          const tooth = Math.pow(0.5 + 0.5 * Math.cos(theta * toothCount), 5.0);
          const verticalRipple = 0.05 * Math.sin(v * Math.PI * 18.0 + theta * 5.0);
          return baseRadius * (1.0 + 0.34 * tooth + verticalRipple);
        }

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const radius = getRadius(theta, u, v);
          const x = Math.sin(theta) * radius;
          const y = (v - 0.5) * height;
          const z = Math.cos(theta) * radius;
          const normal = normalizeVector(x, 0, z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });
        pushGearCap(stream, height * 0.5, 1, columns, rings, getRadius);
        pushGearCap(stream, -height * 0.5, -1, columns, rings, getRadius);

        return createRipplePrimitive(targetRenderer, stream);
      }

      function createTwistedSuperquadricPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = (v - 0.5) * Math.PI;
          const twist = theta + Math.sin(phi) * 2.6;
          const cosPhi = Math.cos(phi);
          const shell =
              1.0 +
              0.06 * Math.sin(theta * 23.0) * Math.cos(phi * 17.0);
          const x =
              0.24 * shell *
              signedPower(cosPhi, 0.52) *
              signedPower(Math.cos(twist), 0.42);
          const y = 0.30 * shell * signedPower(Math.sin(phi), 0.62);
          const z =
              0.24 * shell *
              signedPower(cosPhi, 0.52) *
              signedPower(Math.sin(twist), 0.42);
          const normal = normalizeVector(x / 0.24, y / 0.30, z / 0.24);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return createRipplePrimitive(targetRenderer, stream);
      }

      function createSpikySpherePrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;
        const radius = 0.22;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = v * Math.PI;
          const sinPhi = Math.sin(phi);
          const spike =
              Math.pow(Math.abs(Math.sin(theta * 29.0) * Math.sin(phi * 19.0)), 7.0);
          const ripple =
              1.0 +
              0.38 * spike +
              0.05 * Math.sin(theta * 11.0 + phi * 13.0);
          const r = radius * ripple;
          const x = Math.sin(theta) * sinPhi * r;
          const y = Math.cos(phi) * r;
          const z = Math.cos(theta) * sinPhi * r;
          const normal = normalizeVector(x, y, z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return createRipplePrimitive(targetRenderer, stream);
      }

      function createWavyTorusPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = v * Math.PI * 2.0;
          const majorRadius = 0.19 + 0.025 * Math.sin(theta * 9.0 + phi * 2.0);
          const minorRadius =
              0.075 * (1.0 + 0.22 * Math.sin(theta * 13.0) * Math.cos(phi * 7.0));
          const ringRadius = majorRadius + minorRadius * Math.cos(phi);
          const x = Math.sin(theta) * ringRadius;
          const y = minorRadius * Math.sin(phi);
          const z = Math.cos(theta) * ringRadius;
          const normal = normalizeVector(
              Math.sin(theta) * Math.cos(phi),
              Math.sin(phi),
              Math.cos(theta) * Math.cos(phi));
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return createRipplePrimitive(targetRenderer, stream);
      }

      function createHelicalTubePrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 512;
        const rows = 96;
        const coilRadius = 0.18;
        const tubeRadius = 0.038;
        const height = 0.58;

        function getCenter(u) {
          const t = u * Math.PI * 4.0;
          return [
            Math.sin(t) * coilRadius,
            (u - 0.5) * height,
            Math.cos(t) * coilRadius
          ];
        }

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const t = u * Math.PI * 4.0;
          const center = getCenter(u);
          const next = getCenter(Math.min(1.0, u + 0.002));
          const previous = getCenter(Math.max(0.0, u - 0.002));
          const tangent = normalizeVector(
              next[0] - previous[0],
              next[1] - previous[1],
              next[2] - previous[2]);
          const radial = normalizeVector(Math.sin(t), 0, Math.cos(t));
          const binormal = normalizeVector(...crossVector(tangent, radial));
          const angle = v * Math.PI * 2.0;
          const radius = tubeRadius * (1.0 + 0.18 * Math.sin(t * 7.0 + angle * 5.0));
          const nx = Math.cos(angle) * radial[0] + Math.sin(angle) * binormal[0];
          const ny = Math.cos(angle) * radial[1] + Math.sin(angle) * binormal[1];
          const nz = Math.cos(angle) * radial[2] + Math.sin(angle) * binormal[2];
          return [
            center[0] + nx * radius,
            center[1] + ny * radius,
            center[2] + nz * radius,
            nx,
            ny,
            nz
          ];
        });

        return createRipplePrimitive(targetRenderer, stream);
      }

      function createCorrugatedShellPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const phi = v * Math.PI;
          const sinPhi = Math.sin(phi);
          const spiralScale = 0.68 + 0.46 * u;
          const corrugation =
              1.0 +
              0.12 * Math.sin(theta * 31.0 + phi * 9.0) +
              0.05 * Math.cos(theta * 7.0 - phi * 15.0);
          const r = 0.22 * spiralScale * corrugation;
          const x = Math.sin(theta) * sinPhi * r + (u - 0.5) * 0.10;
          const y = Math.cos(phi) * r * 0.82;
          const z = Math.cos(theta) * sinPhi * r;
          const normal = normalizeVector(
              x - (u - 0.5) * 0.10,
              y / 0.82,
              z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return createRipplePrimitive(targetRenderer, stream);
      }

      function createLobedCrystalPrimitive(targetRenderer) {
        const stream = new PrimitiveStream();
        const columns = 320;
        const rows = 160;
        const height = 0.58;

        pushParametricSurface(stream, columns, rows, (u, v) => {
          const theta = u * Math.PI * 2.0;
          const y = (v - 0.5) * height;
          const taper = 1.0 - Math.pow(Math.abs(v - 0.5) * 2.0, 1.7);
          const facets =
              1.0 +
              0.32 * Math.pow(Math.abs(Math.cos(theta * 8.0)), 9.0) +
              0.08 * Math.sin(theta * 21.0 + v * Math.PI * 18.0);
          const radius = 0.07 + 0.19 * Math.max(0.0, taper) * facets;
          const x = Math.sin(theta) * radius;
          const z = Math.cos(theta) * radius;
          const normal = normalizeVector(x, 0.18 * Math.sign(v - 0.5), z);
          return [x, y, z, normal[0], normal[1], normal[2]];
        });

        return createRipplePrimitive(targetRenderer, stream);
      }

      function createSelectionScene(targetRenderer, options = {}) {
        const motionVectorPass = !!options.motionVectorPass;
        const targetScene = new GPUScene();
        if (!motionVectorPass) {
          targetScene.addNode(new Gltf2GPUNode({url: '../media/gltf/cube-room/cube-room.gltf'}));
          targetScene.enableStats(true);
          targetScene.standingStats(true);
          targetScene._stats.translation = [0, 1.0, -0.75];
        }
        targetScene.setRenderer(targetRenderer);
        const previousRippleAnimator = buildingRippleAnimator;
        buildingRippleAnimator = useRipple.checked ?
            new RippleAnimator(targetRenderer.device) :
            null;

        const targetShapes = [];
        const shapePrimitives = [
          createRuffledSpherePrimitive(targetRenderer),
          createTorusKnotPrimitive(targetRenderer),
          createRidgedGearPrimitive(targetRenderer),
          createTwistedSuperquadricPrimitive(targetRenderer),
          createSpikySpherePrimitive(targetRenderer),
          createWavyTorusPrimitive(targetRenderer),
          createHelicalTubePrimitive(targetRenderer),
          createCorrugatedShellPrimitive(targetRenderer),
          createLobedCrystalPrimitive(targetRenderer)
        ];

        function addShape(shapeDefinition, slotIndex) {
          const shapeMaterial = motionVectorPass ?
              new MotionVectorGPUMaterial() :
              new FragmentStressGPUMaterial();
          shapeMaterial.state.cullFace = false;
          shapeMaterial.baseColorFactor.value = [
            shapeDefinition.color[0],
            shapeDefinition.color[1],
            shapeDefinition.color[2],
            1.0
          ];
          const shapeRenderPrimitive =
              targetRenderer.createRenderPrimitive(
                  shapePrimitives[shapeDefinition.primitive],
                  shapeMaterial);
          const shapeNode = new Node();
          shapeNode.addRenderPrimitive(shapeRenderPrimitive);
          const active = slotIndex < getShapeCount();
          shapeNode.selectable = active;
          shapeNode.visible = active;

          const shape = {
            active: active,
            node: shapeNode,
            renderPrimitive: shapeRenderPrimitive,
            homePosition: shapeDefinition.position.slice(),
            position: shapeDefinition.position.slice(),
            scale: [1, 1, 1],
            selected: false,
            grabbed: false,
            originalPos: null,
          };
          targetShapes.push(shape);
          targetScene.addNode(shapeNode);
        }

        for (let i = 0; i < SHAPE_DEFINITIONS.length; ++i) {
          addShape(SHAPE_DEFINITIONS[i], i);
        }

        const targetRippleAnimator = buildingRippleAnimator;
        buildingRippleAnimator = previousRippleAnimator;
        return {
          scene: targetScene,
          shapes: targetShapes,
          rippleAnimator: targetRippleAnimator,
        };
      }

      function createRendererAndScene(colorFormat) {
        clearPreviousMatrices();
        renderer = new GPURenderer(device, colorFormat, {
          sampleCount: doAntialias.checked ? 4 : 1,
        });
        const sceneState = createSelectionScene(renderer);
        scene = sceneState.scene;
        shapes = sceneState.shapes;
        rippleAnimator = sceneState.rippleAnimator;

        motionRenderer = null;
        motionScene = null;
        motionShapes = [];
        motionRippleAnimator = null;
        if (spaceWarpEnabled) {
          motionRenderer = new DepthStoringGPURenderer(device, 'rgba16float', {
            sampleCount: 1,
          });
          const motionSceneState = createSelectionScene(
              motionRenderer,
              {motionVectorPass: true});
          motionScene = motionSceneState.scene;
          motionShapes = motionSceneState.shapes;
          motionRippleAnimator = motionSceneState.rippleAnimator;
        }

        controllers = {};
        lasers = [];
        activeLasers = 0;
        syncShapeCount();
      }

      function configureCanvas(format) {
        if (!device) {
          return false;
        }

        if (!canvasContext) {
          canvasContext = webgpuCanvas.getContext('webgpu');
        }
        if (!canvasContext) {
          return false;
        }

        if (canvasConfiguredFormat != format) {
          canvasContext.configure({
            device,
            format,
            alphaMode: 'opaque',
          });
          canvasConfiguredFormat = format;
        }
        return true;
      }

      function resizeCanvasToDisplaySize() {
        const devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);
        const width = Math.max(
            1,
            Math.floor((webgpuCanvas.clientWidth || webgpuCanvas.width) * devicePixelRatio));
        const height = Math.max(
            1,
            Math.floor((webgpuCanvas.clientHeight || webgpuCanvas.height) * devicePixelRatio));

        if (webgpuCanvas.width != width || webgpuCanvas.height != height) {
          webgpuCanvas.width = width;
          webgpuCanvas.height = height;
          canvasDepthTexture = null;
        }

        return {width, height};
      }

      function getCanvasDepthTexture(width, height) {
        if (canvasDepthTexture &&
            canvasDepthWidth == width &&
            canvasDepthHeight == height) {
          return canvasDepthTexture;
        }

        if (canvasDepthTexture) {
          canvasDepthTexture.destroy();
        }

        canvasDepthTexture = device.createTexture({
          size: [width, height],
          format: 'depth24plus',
          usage: GPUTextureUsage.RENDER_ATTACHMENT,
        });
        canvasDepthWidth = width;
        canvasDepthHeight = height;
        return canvasDepthTexture;
      }

      function getXRColorDepthView(subImage, viewDesc) {
        const width = subImage.colorTexture.width ||
            Math.ceil(subImage.viewport.x + subImage.viewport.width);
        const height = subImage.colorTexture.height ||
            Math.ceil(subImage.viewport.y + subImage.viewport.height);
        const layers = subImage.colorTexture.depthOrArrayLayers || 1;

        if (!xrColorDepthTexture ||
            xrColorDepthWidth != width ||
            xrColorDepthHeight != height ||
            xrColorDepthLayers != layers) {
          if (xrColorDepthTexture) {
            xrColorDepthTexture.destroy();
          }

          xrColorDepthTexture = device.createTexture({
            size: [width, height, layers],
            format: 'depth24plus',
            usage: GPUTextureUsage.RENDER_ATTACHMENT,
          });
          xrColorDepthWidth = width;
          xrColorDepthHeight = height;
          xrColorDepthLayers = layers;
        }

        const depthViewDesc = Object.assign({}, viewDesc);
        delete depthViewDesc.format;
        return xrColorDepthTexture.createView(depthViewDesc);
      }

      function drawCanvasFrame() {
        if (!scene || !renderer || !canvasContext) {
          return;
        }

        const canvasSize = resizeCanvasToDisplaySize();
        const aspect = canvasSize.width / canvasSize.height;
        const halfHeight = 1.9;
        const halfWidth = Math.max(2.6, halfHeight * aspect);
        orthoZO(
            CANVAS_PROJECTION_MATRIX,
            -halfWidth,
            halfWidth,
            -halfHeight,
            halfHeight,
            0.05,
            8.0);

        const renderView = new RenderView(
            CANVAS_PROJECTION_MATRIX,
            BENCHMARK_FIXED_VIEW_MATRIX,
            {
              x: 0,
              y: 0,
              width: canvasSize.width,
              height: canvasSize.height,
            },
            'left');
        renderView.viewTransform = BENCHMARK_FIXED_CAMERA_TRANSFORM;
        renderView._colorView = canvasContext.getCurrentTexture().createView();
        renderView._depthView =
            getCanvasDepthTexture(canvasSize.width, canvasSize.height).createView();
        scene.drawViewArray([renderView]);
      }

      function onCanvasFrame(time) {
        requestAnimationFrame(onCanvasFrame);
        if (xrButton && xrButton.session) {
          return;
        }
        if (!scene || !renderer) {
          return;
        }

        scene.startFrame();
        updateShapeMatrices(time);
        if (rippleAnimator) {
          rippleAnimator.update();
        }
        drawCanvasFrame();
        scene.endFrame();
      }

      function startCanvasFrames() {
        if (canvasFrameStarted) {
          return;
        }

        canvasFrameStarted = true;
        requestAnimationFrame(onCanvasFrame);
      }

      function rebuildCanvasPreview() {
        if (!device || (xrButton && xrButton.session)) {
          return;
        }

        configureCanvas(canvasFormat);
        createRendererAndScene(canvasFormat);
      }

      function updateFeatureControls() {
        const canEnter =
            immersiveVrSupported &&
            !!device &&
            !!navigator.xr &&
            'XRGPUBinding' in window;

        if (webgpuStatus) {
          webgpuStatus.textContent = canEnter ?
              'WebGPU XR support detected.' :
              'WebGPU XR support was not detected.';
        }

        const sessionActive = !!(xrButton && xrButton.session);
        useSpaceWarp.disabled = !!benchmarkState || sessionActive;
        doAntialias.disabled = !!benchmarkState || sessionActive;
        useRipple.disabled = !!benchmarkState || sessionActive;
        shapeCountControl.disabled = !!benchmarkState;
        if (xrButton) {
          xrButton.enabled = canEnter && (!benchmarkState || !!xrButton.session);
        }
        benchmarkButton.disabled =
            !canEnter || !!benchmarkState || sessionActive;
      }

      async function initXR() {
        if (!navigator.gpu) {
          webgpuStatus.textContent = 'WebGPU is not supported.';
          return;
        }

        device = await createWebGPUContext({xrCompatible: true});
        if (!device) {
          webgpuStatus.textContent = 'Failed to create a WebGPU device.';
          return;
        }

        canvasFormat = navigator.gpu.getPreferredCanvasFormat();
        configureCanvas(canvasFormat);
        createRendererAndScene(canvasFormat);
        startCanvasFrames();

        xrButton = new WebXRButton({
          onRequestSession: onRequestSession,
          onEndSession: onEndSession
        });
        document.querySelector('header').appendChild(xrButton.domElement);

        if (!navigator.xr) {
          webgpuStatus.textContent = 'WebXR is not supported.';
          updateFeatureControls();
          return;
        }

        if (!('XRGPUBinding' in window)) {
          webgpuStatus.textContent = 'WebXR/WebGPU interop is not supported.';
          updateFeatureControls();
          return;
        }

        immersiveVrSupported =
            await navigator.xr.isSessionSupported('immersive-vr');
        updateFeatureControls();
      }

      function onRequestSession() {
        spaceWarpRequested = useSpaceWarp.checked;
        const requiredFeatures = ['local-floor', 'webgpu'];
        if (spaceWarpRequested) {
          requiredFeatures.push('space-warp');
        }

        return navigator.xr.requestSession('immersive-vr', {
          requiredFeatures,
        }).then(onSessionStarted);
      }

      function onSessionStarted(session) {
        xrButton.setSession(session);
        spaceWarpEnabled = spaceWarpRequested;
        const benchmarkSession = !!benchmarkState;
        if (benchmarkSession) {
          benchmarkState.session = session;
        }

        session.addEventListener('end', onSessionEnded);

        if (!benchmarkSession) {
          session.addEventListener('selectstart', onSelectStart);
          session.addEventListener('selectend', onSelectEnd);
          session.addEventListener('select', onSelect);

          session.addEventListener('squeezestart', onSqueezeStart);
          session.addEventListener('squeezeend', onSqueezeEnd);
          session.addEventListener('squeeze', onSqueeze);

          session.addEventListener('inputsourceschange', (event) => {
            for (let inputSource of event.added) {
              if (inputSource.targetRayMode == 'tracked-pointer') {
                fetchProfile(inputSource, DEFAULT_PROFILES_PATH).then(({profile, assetPath}) => {
                  let key = inputSource.profiles[0] + '_' + inputSource.handedness;
                  if (!controllers[key] && scene) {
                    let controllerNode = new Gltf2GPUNode({url: assetPath});
                    setNodeTreeVisible(controllerNode, false);
                    controllers[key] = controllerNode;
                    scene.addNode(controllerNode);
                  }
                });
              }
            }
          });
        }

        binding = new XRGPUBinding(session, device);

        let colorFormat = binding.getPreferredColorFormat();

        const layerInit = {
          colorFormat: colorFormat,
          depthStencilFormat: 'depth24plus',
          clearOnAccess: false,
        };
        if (spaceWarpEnabled) {
          layerInit.textureType = 'texture-array';
        }
        layer = binding.createProjectionLayer(layerInit);

        session.updateRenderState({ layers: [layer] });

        configureCanvas(colorFormat);
        createRendererAndScene(colorFormat);

        updateFeatureControls();

        session.requestReferenceSpace('local-floor').then((refSpace) => {
          xrRefSpace = refSpace;
          session.requestAnimationFrame(onXRFrame);
        });
      }

      function onEndSession(session) {
        session.end();
      }

      function onSessionEnded(event) {
        const endedBenchmark =
            benchmarkState && benchmarkState.session === event.session;
        xrButton.setSession(null);
        xrRefSpace = null;
        binding = null;
        layer = null;
        spaceWarpEnabled = false;
        identityDeltaPose = null;
        if (xrColorDepthTexture) {
          xrColorDepthTexture.destroy();
        }
        xrColorDepthTexture = null;
        xrColorDepthWidth = 0;
        xrColorDepthHeight = 0;
        xrColorDepthLayers = 0;
        renderer = null;
        motionRenderer = null;
        scene = null;
        motionScene = null;
        shapes = [];
        motionShapes = [];
        rippleAnimator = null;
        motionRippleAnimator = null;
        clearPreviousMatrices();
        currentlySelectedShapes = [null, null];
        currentlyGrabbedShapes = [null, null];
        controllers = {};
        lasers = [];
        activeLasers = 0;

        if (endedBenchmark) {
          if (!benchmarkState.finished) {
            benchmarkStatus.textContent = 'Benchmark cancelled.';
          }
          benchmarkState = null;
        }
        configureCanvas(canvasFormat);
        createRendererAndScene(canvasFormat);
        updateFeatureControls();
      }

      function getHandIndex(inputSource) {
        return inputSource.handedness == 'left' ? 0 : 1;
      }

      function findHitShape(frame, inputSource) {
        if (!scene || isBenchmarkSession(frame.session)) {
          return null;
        }

        const targetRayPose = frame.getPose(inputSource.targetRaySpace, xrRefSpace);
        if (!targetRayPose) {
          return null;
        }

        const hitResult = scene.hitTest(targetRayPose.transform);
        if (!hitResult) {
          return null;
        }

        return shapes.find(shape => hitResult.node == shape.node) || null;
      }

      function onSelectStart(ev) {
        const hitShape = findHitShape(ev.frame, ev.inputSource);
        if (!hitShape) {
          return;
        }

        const handIndex = getHandIndex(ev.inputSource);
        currentlySelectedShapes[handIndex] = hitShape;
        hitShape.scale = [1.25, 1.25, 1.25];
        hitShape.selected = false;
      }

      function onSelectEnd(ev) {
        const handIndex = getHandIndex(ev.inputSource);
        const selectedShape = currentlySelectedShapes[handIndex];
        if (!selectedShape) {
          return;
        }

        if (selectedShape.selected) {
          vec3.add(selectedShape.scale, selectedShape.scale, [0.25, 0.25, 0.25]);
          selectedShape.selected = false;
        } else {
          selectedShape.scale = [0.75, 0.75, 0.75];
        }
        currentlySelectedShapes[handIndex] = null;
      }

      function onSelect(ev) {
        const handIndex = getHandIndex(ev.inputSource);
        const selectedShape = currentlySelectedShapes[handIndex];
        if (!selectedShape) {
          return;
        }

        const uniforms = selectedShape.renderPrimitive.uniforms;
        uniforms.baseColorFactor.value = [Math.random(), Math.random(), Math.random(), 1.0];
        vec3.add(selectedShape.scale, selectedShape.scale, [-0.5, -0.5, -0.5]);
        selectedShape.selected = true;
      }

      function onSqueezeStart(ev) {
        const hitShape = findHitShape(ev.frame, ev.inputSource);
        if (!hitShape || hitShape.grabbed) {
          return;
        }

        const handIndex = getHandIndex(ev.inputSource);
        currentlyGrabbedShapes[handIndex] = hitShape;
        hitShape.scale = [0.1, 0.1, 0.1];
        hitShape.originalPos = hitShape.position;
        hitShape.grabbed = true;
      }

      function onSqueezeEnd(ev) {
        const handIndex = getHandIndex(ev.inputSource);
        const grabbedShape = currentlyGrabbedShapes[handIndex];
        if (!grabbedShape || !grabbedShape.grabbed) {
          return;
        }

        vec3.add(grabbedShape.scale, grabbedShape.scale, [1, 1, 1]);
        grabbedShape.position = grabbedShape.originalPos;
        grabbedShape.grabbed = false;
        currentlyGrabbedShapes[handIndex] = null;
      }

      function onSqueeze(ev) {
        const handIndex = getHandIndex(ev.inputSource);
        const grabbedShape = currentlyGrabbedShapes[handIndex];
        if (!grabbedShape || !grabbedShape.grabbed) {
          return;
        }

        const uniforms = grabbedShape.renderPrimitive.uniforms;
        uniforms.baseColorFactor.value = [Math.random(), Math.random(), Math.random(), 1.0];
      }

      function updateInputSources(frame) {
        for (let key in controllers) {
          setNodeTreeVisible(controllers[key], false);
        }
        for (let laser of lasers) {
          setNodeTreeVisible(laser, false);
        }
        activeLasers = 0;

        if (isBenchmarkSession(frame.session)) {
          return;
        }

        for (let inputSource of frame.session.inputSources) {
          if (inputSource.gripSpace) {
            let gripPose = frame.getPose(inputSource.gripSpace, xrRefSpace);
            if (gripPose) {
              let key = inputSource.profiles[0] + '_' + inputSource.handedness;
              if (controllers[key]) {
                controllers[key].matrix = gripPose.transform.matrix;
                setNodeTreeVisible(controllers[key], true);
              }
            }
          }

          let targetRayPose = frame.getPose(inputSource.targetRaySpace, xrRefSpace);
          if (!targetRayPose) {
            continue;
          }

          if (inputSource.targetRayMode == 'tracked-pointer') {
            let laser;
            if (activeLasers < lasers.length) {
              laser = lasers[activeLasers];
            } else {
              laser = createLaserMesh(renderer);
              lasers.push(laser);
              scene.addNode(laser);
            }
            laser.matrix = targetRayPose.transform.matrix;
            setNodeTreeVisible(laser, true);
            activeLasers++;
          }

          const handIndex = getHandIndex(inputSource);
          const grabbedShape = currentlyGrabbedShapes[handIndex];
          if (!grabbedShape || !grabbedShape.grabbed) {
            continue;
          }

          const targetRay = new Ray(targetRayPose.transform.matrix);
          const grabDistance = 0.1;
          const grabPos = vec3.fromValues(
              targetRay.origin[0],
              targetRay.origin[1],
              targetRay.origin[2]);
          vec3.add(grabPos, grabPos, [
              targetRay.direction[0] * grabDistance,
              targetRay.direction[1] * grabDistance + 0.06,
              targetRay.direction[2] * grabDistance,
              ]);
          grabbedShape.position = grabPos;
        }
      }

      function updateShapeMatrices(time, targetShapes = shapes, sourceShapes = targetShapes) {
        for (let i = 0; i < targetShapes.length; ++i) {
          let shape = targetShapes[i];
          let sourceShape = sourceShapes[i] || shape;
          if (sourceShape !== shape) {
            shape.active = sourceShape.active;
            shape.position = sourceShape.position;
            shape.scale = sourceShape.scale;
            shape.node.visible = sourceShape.node.visible;
            shape.node.selectable = false;
          }

          let node = shape.node;
          mat4.identity(node.matrix);
          mat4.translate(node.matrix, node.matrix, shape.position);
          mat4.rotateX(node.matrix, node.matrix, time / 2500);
          mat4.rotateY(node.matrix, node.matrix, time / 3750);
          mat4.scale(node.matrix, node.matrix, shape.scale);
        }
      }

      function updateSpaceWarpDeltaPose() {
        if (!spaceWarpEnabled || !layer || !('deltaPose' in layer) ||
            !('XRRigidTransform' in window)) {
          return;
        }

        if (!identityDeltaPose) {
          identityDeltaPose = new XRRigidTransform();
        }
        layer.deltaPose = identityDeltaPose;
      }

      function applyBenchmarkViewOverrides(frame, renderView) {
        if (!isBenchmarkSession(frame.session)) {
          return;
        }

        renderView.viewTransform = BENCHMARK_FIXED_CAMERA_TRANSFORM;
        renderView.projectionMatrix = BENCHMARK_FIXED_PROJECTION_MATRIX;
        renderView._viewMatrix = BENCHMARK_FIXED_VIEW_MATRIX;
      }

      function getSpaceWarpViewport(subImage) {
        const width = subImage.motionVectorTextureWidth ||
            subImage.depthStencilTextureWidth ||
            subImage.motionVectorTexture.width ||
            subImage.viewport.width;
        const height = subImage.motionVectorTextureHeight ||
            subImage.depthStencilTextureHeight ||
            subImage.motionVectorTexture.height ||
            subImage.viewport.height;
        return {
          x: 0,
          y: 0,
          width,
          height,
        };
      }

      function renderMotionAndDepth(frame, pose) {
        if (!spaceWarpEnabled || !pose || !motionScene || !motionRenderer) {
          return;
        }

        let motionViews = [];
        for (let i = 0; i < pose.views.length; ++i) {
          let view = pose.views[i];
          let subImage = binding.getViewSubImage(layer, view);
          if (!subImage.motionVectorTexture || !subImage.depthStencilTexture) {
            return;
          }

          let viewDesc = subImage.getViewDescriptor();
          let motionView = subImage.motionVectorTexture.createView(viewDesc);
          let depthView = subImage.depthStencilTexture.createView(viewDesc);
          let renderView = new WebXRGPUView(view, subImage, motionView, depthView);
          renderView.viewport = getSpaceWarpViewport(subImage);
          applyBenchmarkViewOverrides(frame, renderView);

          const previous = previousMatrices[i];
          renderView.previousProjectionMatrix =
              previous ? previous.projectionMatrix : renderView.projectionMatrix;
          renderView.previousViewMatrix =
              previous ? previous.viewMatrix : renderView.viewMatrix;
          motionViews.push(renderView);
        }

        motionScene.drawViewArray(motionViews);

        for (let i = 0; i < motionViews.length; ++i) {
          previousMatrices[i] = {
            projectionMatrix: mat4.clone(motionViews[i].projectionMatrix),
            viewMatrix: mat4.clone(motionViews[i].viewMatrix),
          };
        }
      }

      function drawXRFrame(frame, pose) {
        if (!pose || !scene) {
          return;
        }

        let views = [];

        for (let view of pose.views) {
          let subImage = binding.getViewSubImage(layer, view);
          let viewDesc = subImage.getViewDescriptor();

          let colorView = subImage.colorTexture.createView(viewDesc);
          let depthView = null;
          if (spaceWarpEnabled) {
            depthView = getXRColorDepthView(subImage, viewDesc);
          } else if (subImage.depthStencilTexture) {
            depthView = subImage.depthStencilTexture.createView(viewDesc);
          }

          let renderView = new WebXRGPUView(view, subImage, colorView, depthView);
          applyBenchmarkViewOverrides(frame, renderView);
          views.push(renderView);
        }

        updateSpaceWarpDeltaPose();
        scene.drawViewArray(views);
        renderMotionAndDepth(frame, pose);
      }

      function onXRFrame(time, frame) {
        let session = frame.session;
        let pose = frame.getViewerPose(xrRefSpace);

        scene.startFrame();
        if (spaceWarpEnabled && motionScene) {
          motionScene.startFrame();
        }
        session.requestAnimationFrame(onXRFrame);

        updateInputSources(frame);
        updateShapeMatrices(time);
        if (rippleAnimator) {
          rippleAnimator.update();
        }
        if (spaceWarpEnabled && motionScene) {
          updateShapeMatrices(time, motionShapes, shapes);
          if (motionRippleAnimator) {
            motionRippleAnimator.update();
          }
        }
        drawXRFrame(frame, pose);

        scene.endFrame();
        if (spaceWarpEnabled && motionScene) {
          motionScene.endFrame();
        }
        updateBenchmark(time, session);
      }

      shapeCountControl.addEventListener('input', syncShapeCount);
      useSpaceWarp.addEventListener('change', updateFeatureControls);
      doAntialias.addEventListener('change', rebuildCanvasPreview);
      useRipple.addEventListener('change', rebuildCanvasPreview);
      benchmarkButton.addEventListener('click', startBenchmark);
      syncShapeCount();

      initXR();
    </script>
  </body>
</html>
